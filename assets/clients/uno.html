<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAN Arcade - UNO</title>
    <style>
        /* --- CSS VARIABLES & BASE STYLES --- */
        :root {
            --red: #E03E36;
            --blue: #2E88D6;
            --green: #56A136;
            --yellow: #F4BF26;
            --wild: #0F172A;
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --text-light: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(ellipse at center, #334155, #020617);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
        }

        #game-screen {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- TOAST --- */
        #toast {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(-20px) scale(0.95);
            opacity: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1.5rem;
            border-radius: 999px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 300;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        /* --- CARDS --- */
        .card {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--card-color);
            border: 4px solid #F8F9FA;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transition: transform 0.2s;
            transform-origin: bottom center;
        }

        .card.size-lg {
            width: 70px;
            height: 100px;
        }

        .card.size-sm {
            width: 48px;
            height: 64px;
            border-width: 3px;
            border-radius: 8px;
        }

        @media (min-width: 640px) {
            .card.size-lg {
                width: 80px;
                height: 128px;
                border-width: 6px;
                border-radius: 16px;
            }

            .card.size-sm {
                width: 64px;
                height: 96px;
            }
        }

        .card-playable {
            cursor: pointer;
            z-index: 100;
        }

        .card-playable:hover {
            transform: translateY(-20px) scale(1.1) !important;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
        }

        .card-disabled {
            filter: brightness(0.75) saturate(0.8);
        }

        .card-ring {
            position: absolute;
            width: 130%;
            height: 110%;
            border-radius: 100%;
            border: 5px solid rgba(255, 255, 255, 0.9);
            transform: rotate(-35deg);
            pointer-events: none;
        }

        .card-center {
            font-weight: 900;
            color: white;
            z-index: 10;
            -webkit-text-stroke: 1.5px black;
            text-shadow: 2px 3px 0 rgba(0, 0, 0, 0.8);
            font-size: 2.2rem;
            line-height: 1;
        }

        .size-lg .card-center {
            font-size: 3.5rem;
            -webkit-text-stroke: 2.5px black;
        }

        .card-corner {
            position: absolute;
            font-weight: 900;
            color: white;
            z-index: 10;
            -webkit-text-stroke: 0.5px black;
            text-shadow: 1px 1px 0 #000;
            font-size: 0.8rem;
        }

        .size-lg .card-corner {
            font-size: 1.1rem;
            -webkit-text-stroke: 1px black;
        }

        .corner-tl {
            top: 4px;
            left: 6px;
        }

        .corner-br {
            bottom: 4px;
            right: 6px;
            transform: rotate(180deg);
        }

        .card-back {
            background-color: var(--red);
        }

        .card-back-inner {
            width: 85%;
            height: 60%;
            border-radius: 100%;
            background: white;
            transform: rotate(-25deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .card-back-text {
            color: var(--yellow);
            font-weight: 900;
            font-style: italic;
            text-shadow: -2px 2px 0 black;
            font-size: 1rem;
        }

        .size-lg .card-back-text {
            font-size: 1.5rem;
        }

        .card-wild {
            background-color: #0F172A !important;
        }

        .card-wild .card-ring {
            background: conic-gradient(
                var(--red) 0% 25%, 
                var(--blue) 25% 50%, 
                var(--green) 50% 75%, 
                var(--yellow) 75% 100%
            );
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4);
        }

        /* --- GAME LAYOUT ELEMENTS --- */
        #opponents-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .avatar-node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
            transition: all 0.5s;
        }

        .avatar-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1e293b;
            border: 3px solid #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            transition: 0.3s;
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .avatar-node.active .avatar-circle {
            border-color: #4ade80;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.5);
        }

        .avatar-spinner {
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 4px solid transparent;
            border-top-color: #4ade80;
            border-right-color: #4ade80;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            display: none;
        }

        .avatar-node.active .avatar-spinner {
            display: block;
        }

        .avatar-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: #020617;
            border: 1px solid #475569;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 10px;
            display: flex;
            align-items: center;
        }

        .badge-icon {
            width: 8px;
            height: 12px;
            background: var(--red);
            border: 1px solid white;
            margin-right: 4px;
        }

        #center-table {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-top: 5vh;
        }

        .direction-ring {
            position: absolute;
            width: 220px;
            height: 220px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            background: conic-gradient(from 0deg, transparent 0%, rgba(255, 255, 255, 0.05) 30%, transparent 100%);
        }

        .piles-container {
            display: flex;
            gap: 2rem;
            z-index: 10;
        }

        #deck-pile {
            position: relative;
            cursor: pointer;
        }

        #deck-pile.active-turn:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .deck-count {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            background: #020617;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid #475569;
        }

        #discard-pile {
            position: relative;
            width: 64px;
            height: 96px;
        }

        #player-area {
            height: 25vh;
            min-height: 160px;
            max-height: 220px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 2rem;
            z-index: 100;
        }

        .local-controls {
            position: absolute;
            left: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 200;
        }

        #uno-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-weight: 900;
            font-style: italic;
            border: 3px solid #475569;
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #uno-btn.ready {
            background: linear-gradient(to bottom right, #F4BF26, #E03E36);
            color: white;
            border-color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            animation: pulse 1s infinite;
        }

        #hand-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
            height: 100%;
        }

        .hand-slot {
            position: absolute;
            transform-origin: bottom center;
            transition: transform 0.3s;
            pointer-events: none;
        }

        /* --- OVERLAYS, BADGES & MODALS --- */
        #color-picker, #swap-picker {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 40px;
            place-items: center;
            z-index: 1000;
            align-content: center;
        }

        #swap-picker {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #color-picker h3, #swap-picker h3 {
            grid-column: 1 / -1;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            color: #f8fafc;
            letter-spacing: 2px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .color-btn {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            border: 4px solid rgba(255,255,255,0.25);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .color-btn:active { transform: scale(0.9); }
        .color-btn.Red { background: var(--red); } 
        .color-btn.Blue { background: var(--blue); }
        .color-btn.Green { background: var(--green); } 
        .color-btn.Yellow { background: var(--yellow); }

        .swap-btn {
            padding: 14px 28px;
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 16px;
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            min-width: 200px;
            text-align: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .swap-btn:active { transform: scale(0.95); background: #334155; }

        #winner-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 500;
        }

        #winner-overlay h2 { font-size: 36px; font-weight: 900; margin: 0; }
        #winner-overlay p { color: #94a3b8; font-size: 18px; margin: 0; }

        #uno-actions {
            position: absolute;
            bottom: 160px;
            right: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 200;
        }

        .catch-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-weight: 900;
            font-size: 9px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 3px solid #fde68a;
            background: linear-gradient(to bottom right, #f59e0b, #d97706);
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: pulse 1s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
            padding: 4px;
        }

        .catch-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.7);
        }

        .status-badge {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-align: center;
        }

        .status-badge.active { color: var(--yellow); border-color: rgba(234,212,38,0.25); }

        .spin-cw {
            animation: spin 8s linear infinite;
        }

        .spin-ccw {
            animation: spin 8s linear infinite reverse;
        }

        /* --- LEADERBOARD PANEL --- */
        #leaderboard-toggle {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #leaderboard-toggle:active { transform: scale(0.95); }

        #leaderboard-panel {
            position: absolute;
            top: 44px;
            left: 12px;
            width: 220px;
            max-height: 260px;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
            z-index: 300;
            display: none;
            flex-direction: column;
            padding: 12px;
            gap: 6px;
        }
        #leaderboard-panel.open { display: flex; }

        .lb-header {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fbbf24;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 2px;
        }

        .lb-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.15s;
        }
        .lb-entry:hover { background: rgba(255, 255, 255, 0.08); }

        .lb-name {
            font-weight: 700;
            font-size: 12px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lb-wins {
            font-weight: 900;
            font-size: 12px;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .lb-empty {
            color: #64748b;
            font-size: 11px;
            font-style: italic;
            text-align: center;
            padding: 12px 0;
        }

        /* --- ORIENTATION OVERLAY --- */
        #orientation-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            color: #fff;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            text-align: center;
            padding: 24px;
        }
        #orientation-overlay svg {
            width: 80px;
            height: 80px;
            color: var(--yellow);
            margin-bottom: 16px;
            animation: rotateDevice 2s ease-in-out infinite;
        }
        @keyframes rotateDevice {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
        }
        @media (orientation: portrait) {
            @media (max-width: 900px) {
                #orientation-overlay {
                    display: flex;
                }
            }
        }

        /* --- SCROLLABLE HAND SYSTEM --- */
        .hand-card-scroll-slot {
            position: relative;
            flex-shrink: 0;
            transition: all 0.3s;
        }


    </style>
</head>
<body>



    <div id="game-screen">
        <!-- Leaderboard Toggle & Panel -->
        <div style="position: absolute; top: 12px; left: 12px; z-index: 20; display: flex; flex-direction: column; gap: 4px;">
            <button id="leaderboard-toggle" onclick="toggleLeaderboard()">🏆 <span id="lb-btn-label">LEADERBOARD</span></button>
            <div id="leaderboard-panel">
                <div class="lb-header">🏆 Room Leaderboard</div>
                <div id="lb-entries"></div>
            </div>
        </div>
        
        <div style="position: absolute; top: 12px; right: 64px; z-index: 20; display: flex; flex-direction: column; gap: 4px;">
            <div class="status-badge" id="timer-indicator" style="display: none;">⏳ 0s</div>
        </div>

        <div id="opponents-container"></div>

        <div id="center-table">
            <div class="direction-ring spin-cw" id="direction-indicator"></div>
            <div class="piles-container">
                <div id="deck-pile" onclick="handleDrawAction()"></div>
                <div id="discard-pile"></div>
            </div>
        </div>

        <div id="player-area">
            <div class="local-controls">
                <div class="avatar-node" id="local-avatar" style="position: relative; transform: none;">
                    <div class="avatar-spinner"></div>
                    <div class="avatar-circle">YOU</div>
                </div>
                <button id="uno-btn" onclick="callUno()">UNO!</button>
            </div>
            <div id="hand-container"></div>
        </div>

        <div id="uno-actions"></div>
    </div>

    <!-- Modals -->
    <div id="color-picker">
        <h3>CHOOSE COLOR</h3>
        <div class="color-btn Red" onclick="chooseColor('Red')"></div>
        <div class="color-btn Blue" onclick="chooseColor('Blue')"></div>
        <div class="color-btn Green" onclick="chooseColor('Green')"></div>
        <div class="color-btn Yellow" onclick="chooseColor('Yellow')"></div>
    </div>

    <div id="swap-picker">
        <h3>SELECT PLAYER TO SWAP HANDS WITH</h3>
        <div id="swap-buttons-container" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <div id="winner-overlay">
        <h2 style="font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎉 MATCH COMPLETED 🎉</h2>
        <div id="placement-list" style="margin: 20px 0; min-width: 250px; display: flex; flex-direction: column; gap: 10px;"></div>
        <button id="lobby-redirect-btn" style="display:none; padding: 12px 24px; border-radius: 12px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; margin-top: 10px;">RETURN TO LOBBY</button>
    </div>

    <div id="toast"></div>

    <!-- Landscape Orientation Overlay for Mobile -->
    <div id="orientation-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" transform="rotate(90 12 12)"></rect>
            <line x1="12" y1="18" x2="12" y2="18"></line>
        </svg>
        <h2>Rotate Your Device</h2>
        <p style="color: #94a3b8; margin-top: 8px;">UNO is best played in landscape mode. Please turn your device.</p>
    </div>

    <script>
        // Client PostMessage bridge to Parent Shell
        (function() {
            var cachedRoom = null;
            var cachedPlayer = null;
            var cachedPublicState = null;
            var cachedPrivateState = null;
            var updateCallbacks = [];

            window.addEventListener('message', function(event) {
                var msg = event.data;
                if (!msg || typeof msg !== 'object') return;
                
                if (msg.type === 'arcade:update') {
                    cachedRoom = msg.room;
                    cachedPlayer = msg.player;
                    cachedPublicState = msg.publicState;
                    cachedPrivateState = msg.privateState;
                    
                    for (var i = 0; i < updateCallbacks.length; i++) {
                        try {
                            updateCallbacks[i]();
                        } catch(e) {
                            console.error("Error in Arcade update callback:", e);
                        }
                    }
                }
            });

            window.Arcade = {
                getRoom: function() { return cachedRoom; },
                getPlayer: function() { return cachedPlayer; },
                getPublicState: function() { return cachedPublicState; },
                getPrivateState: function() { return cachedPrivateState; },
                
                sendAction: function(type, data) {
                    window.parent.postMessage({
                        type: 'arcade:action',
                        actionType: type,
                        actionData: data
                    }, '*');
                },
                
                unlockAchievement: function(achievementId) {
                    window.parent.postMessage({
                        type: 'arcade:achievement',
                        achievementId: achievementId
                    }, '*');
                },
                
                haptics: {
                    trigger: function(type) {
                        window.parent.postMessage({
                            type: 'arcade:haptic',
                            hapticType: type
                        }, '*');
                    }
                },
                
                returnToLobby: function() {
                    window.parent.postMessage({
                        type: 'arcade:reset'
                    }, '*');
                },
                
                onUpdate: function(callback) {
                    updateCallbacks.push(callback);
                    return function() {
                        updateCallbacks = updateCallbacks.filter(function(cb) { return cb !== callback; });
                    };
                }
            };

            window.parent.postMessage({ type: 'arcade:init' }, '*');
        })();

        const Arcade = window.Arcade;
        if (!Arcade) {
            console.error("Arcade SDK not found. UNO client must be run inside LAN Arcade platform.");
        }

        function getOrdinal(n) {
            const s = ["th", "st", "nd", "rd"];
            const v = n % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        function isCardPlayable(card, publicState, isMyTurn) {
            if (!isMyTurn) return false;
            if (!publicState) return false;
            
            // Stacking Logic / Penalty pending
            if (publicState.drawPending > 0) {
                if (!publicState.settings || !publicState.settings.stacking) {
                    return false; // Stacking disabled, must draw penalty
                }
                // If stacking is enabled, stack ONLY matching penalty cards (+2 on +2, +4 on +4)
                return card.value === publicState.currentValue;
            }

            // Normal match logic
            return card.color === 'Wild' || 
                   card.color === publicState.currentColor || 
                   card.value === publicState.currentValue;
        }

        let selectedCardIdx = null;
        let lbOpen = false;
        const catchableTimestamps = {}; // { oppId: firstSeenTimestamp }

        // --- LEADERBOARD FUNCTIONS ---
        function toggleLeaderboard() {
            ensureAudioResumed();
            lbOpen = !lbOpen;
            const panel = document.getElementById('leaderboard-panel');
            if (lbOpen) {
                panel.classList.add('open');
                updateLeaderboardPanel();
            } else {
                panel.classList.remove('open');
            }
        }

        // Close leaderboard when clicking outside
        document.addEventListener('click', function(e) {
            if (lbOpen && !e.target.closest('#leaderboard-panel') && !e.target.closest('#leaderboard-toggle')) {
                lbOpen = false;
                document.getElementById('leaderboard-panel').classList.remove('open');
            }
        }, true);

        function updateLeaderboardPanel() {
            if (!Arcade) return;
            const room = Arcade.getRoom();
            if (!room) return;

            const leaderboardData = room.settings?._leaderboard || {};
            const entriesEl = document.getElementById('lb-entries');
            if (!entriesEl) return;

            const sorted = Object.entries(leaderboardData)
                .map(([id, data]) => ({
                    id,
                    name: typeof data === 'object' ? data.name : `Player`,
                    wins: typeof data === 'object' ? (data.wins || 0) : (data || 0),
                }))
                .sort((a, b) => b.wins - a.wins);

            if (sorted.length === 0) {
                entriesEl.innerHTML = '<div class="lb-empty">No wins recorded yet.<br>Play a match!</div>';
                return;
            }

            entriesEl.innerHTML = sorted.map((entry, idx) => {
                const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx + 1}`;
                return `
                    <div class="lb-entry">
                        <span class="lb-name">${medal} ${entry.name}</span>
                        <span class="lb-wins">${entry.wins} W</span>
                    </div>
                `;
            }).join('');
        }

        // --- SVGs ---
        const SVG_SKIP = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:100%; height:100%;"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>`;
        const SVG_REV = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:100%; height:100%;"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>`;

        // --- COLORS ---
        const COLOR_HEX = { 'Red': '#E03E36', 'Blue': '#2E88D6', 'Green': '#56A136', 'Yellow': '#F4BF26', 'Wild': '#0F172A' };

        // --- DOM REFERENCE ---
        const DOM = {
            gameScreen: document.getElementById('game-screen'),
            toast: document.getElementById('toast'),
            opponentsContainer: document.getElementById('opponents-container'),
            handContainer: document.getElementById('hand-container'),
            deckPile: document.getElementById('deck-pile'),
            discardPile: document.getElementById('discard-pile'),
            dirRing: document.getElementById('direction-indicator'),
            localAvatar: document.getElementById('local-avatar'),
            unoBtn: document.getElementById('uno-btn')
        };

        let pendingCardIdx = null;
        let toastTimer = null;

        // --- TOAST ---
        function showToast(msg) {
            DOM.toast.innerHTML = msg;
            DOM.toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => DOM.toast.classList.remove('show'), 2500);
        }

        // --- RENDER CARD HTML ---
        const getIconHTML = (value, isLarge) => {
            const dims = isLarge ? 'width: 60px; height: 60px;' : 'width: 20px; height: 20px;';
            if (value === 'Skip' || value === 'Reverse') {
                const svg = value === 'Skip' ? SVG_SKIP : SVG_REV;
                const shadowOffset = '2px 3px 0 rgba(0,0,0,0.8)';
                const strokeWidth = isLarge ? '5px' : '4px';
                return `
                    <div style="position:relative; ${dims}">
                        <div style="position:absolute; inset:0; color:black; filter:drop-shadow(${shadowOffset}); stroke-width:${strokeWidth};">${svg}</div>
                        <div style="position:absolute; inset:0; color:white;">${svg}</div>
                    </div>
                `;
            }
            
            let displayVal = value;
            if (value === 'DrawTwo') displayVal = '+2';
            else if (value === 'WildDrawFour') displayVal = '+4';
            else if (value === 'Wild') displayVal = 'Wild';
            
            return `<span class="card-center">${displayVal}</span>`;
        };

        const getSmallIconHTML = (value, isLarge) => {
            if (value === 'Skip' || value === 'Reverse') {
                const svg = value === 'Skip' ? SVG_SKIP : SVG_REV;
                const dims = 'width: 14px; height: 14px;';
                if (isLarge) {
                    return `
                        <div style="position:relative; width: 24px; height: 24px;">
                            <div style="position:absolute; inset:0; color:black; stroke-width:4px;">${svg}</div>
                            <div style="position:absolute; inset:0; color:white;">${svg}</div>
                        </div>
                    `;
                }
                return `
                    <div style="position:relative; ${dims}">
                        <div style="position:absolute; inset:0; color:black; stroke-width:3px;">${svg}</div>
                        <div style="position:absolute; inset:0; color:white;">${svg}</div>
                    </div>
                `;
            }
            
            let displayVal = value;
            if (value === 'DrawTwo') displayVal = '+2';
            else if (value === 'WildDrawFour') displayVal = '+4';
            else if (value === 'Wild') displayVal = 'W';
            
            return `<span class="card-corner">${displayVal}</span>`;
        };

        const createCardHTML = (card, size = 'lg', isHidden = false, isPlayable = false, extraStyle = '', index = -1) => {
            if (isHidden) {
                return `
                    <div class="card card-back size-${size}" style="${extraStyle}">
                        <div class="card-back-inner"><span class="card-back-text">UNO</span></div>
                    </div>
                `;
            }
            const colorHex = COLOR_HEX[card.color] || '#0f172a';
            const playClass = isPlayable ? 'card-playable' : 'card-disabled';
            const clickAttr = isPlayable ? `onclick="playCard(${index})"` : '';
            const wildClass = card.color === 'Wild' ? 'card-wild' : '';

            return `
                <div class="card size-${size} ${playClass} ${wildClass}" style="--card-color: ${colorHex}; ${extraStyle}" ${clickAttr}>
                    <div class="card-ring"></div>
                    <div class="card-corner corner-tl">${getSmallIconHTML(card.value, size === 'lg')}</div>
                    <div class="card-corner corner-br">${getSmallIconHTML(card.value, size === 'lg')}</div>
                    ${getIconHTML(card.value, size === 'lg')}
                </div>
            `;
        };

        // --- ACTION SENDER ---
        let lastActionTime = 0;
        function safeAction(name, payload) {
            if (!Arcade) return;
            const now = Date.now();
            if (now - lastActionTime < 300) return;
            lastActionTime = now;
            Arcade.sendAction(name, payload);
        }

        // --- BUTTON HANDLERS ---
        function playCard(idx) {
            ensureAudioResumed();
            if (!Arcade) return;
            const privateState = Arcade.getPrivateState();
            if (!privateState || !privateState.hand) return;
            const card = privateState.hand[idx];
            
            const publicState = Arcade.getPublicState();
            const isSevenZero = publicState && publicState.settings && publicState.settings.sevenZero;

            // Double-tap selection check
            if (selectedCardIdx !== idx) {
                selectedCardIdx = idx;
                updateUI();
                return;
            }

            // Play the card on second click
            selectedCardIdx = null; 
            if (card.color === 'Wild') {
                pendingCardIdx = idx;
                document.getElementById('color-picker').style.display = 'grid';
            } else if (card.value === '7' && isSevenZero) {
                pendingCardIdx = idx;
                showSwapPlayerPicker();
            } else {
                safeAction('PLAY_CARD', { cardIndex: idx });
            }
        }

        // Reset selection on click outside playable cards
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.card-playable') && !e.target.closest('#uno-btn') && !e.target.closest('.color-btn') && !e.target.closest('.swap-btn')) {
                if (selectedCardIdx !== null) {
                    selectedCardIdx = null;
                    updateUI();
                }
            }
        });

        function chooseColor(color) {
            ensureAudioResumed();
            safeAction('PLAY_CARD', { cardIndex: pendingCardIdx, chosenColor: color });
            document.getElementById('color-picker').style.display = 'none';
            pendingCardIdx = null;
        }

        function showSwapPlayerPicker() {
            ensureAudioResumed();
            if (!Arcade) return;
            const room = Arcade.getRoom();
            const player = Arcade.getPlayer();
            const container = document.getElementById('swap-buttons-container');
            container.innerHTML = '';

            const others = room.players.filter(p => p.id !== player.id);
            if (others.length === 0) {
                safeAction('PLAY_CARD', { cardIndex: pendingCardIdx });
                pendingCardIdx = null;
                return;
            }

            others.forEach(other => {
                const btn = document.createElement('button');
                btn.className = 'swap-btn';
                btn.textContent = other.name.toUpperCase();
                btn.onclick = (e) => {
                    e.preventDefault();
                    safeAction('PLAY_CARD', { cardIndex: pendingCardIdx, swapPlayerId: other.id });
                    document.getElementById('swap-picker').style.display = 'none';
                    pendingCardIdx = null;
                };
                container.appendChild(btn);
            });

            document.getElementById('swap-picker').style.display = 'flex';
        }

        function handleDrawAction() {
            ensureAudioResumed();
            if (!Arcade) return;
            const publicState = Arcade.getPublicState();
            const player = Arcade.getPlayer();
            if (!publicState || publicState.currentPlayerId !== player.id) return;
            safeAction('DRAW_CARD', {});
        }

        function callUno() {
            ensureAudioResumed();
            if (!Arcade) return;
            const publicState = Arcade.getPublicState();
            const player = Arcade.getPlayer();
            const privateState = Arcade.getPrivateState();
            const hand = privateState?.hand || [];
            const unoDeclared = publicState?.unoDeclared || {};
            
            if (hand.length === 1 && !unoDeclared[player.id]) {
                safeAction('DECLARE_UNO', {});
            }
        }

        // --- SOUND EFFECTS SYSTEM ---
        let lastState = {
            status: null,
            round: null,
            topCard: null,
            currentPlayerId: null,
            direction: null,
            cardCounts: {},
            unoDeclared: {}
        };

        // --- WEB AUDIO CENTRAL DELEGATOR ---
        function playSound(name) {
            const key = name.replace('.wav', '');
            if (Arcade && Arcade.audio && typeof Arcade.audio.play === 'function') {
                Arcade.audio.play(key);
            }
        }

        function ensureAudioResumed() {
            // Handled centrally by parent web shell
        }

        // --- UPDATE LAYOUT & RENDER HANDS ---
        function updateUI() {
            if (!Arcade) return;
            const publicState = Arcade.getPublicState();
            const privateState = Arcade.getPrivateState();
            const player = Arcade.getPlayer();
            const room = Arcade.getRoom();

            if (!publicState || !room) return;

            // Gather card counts for transition tracking
            const cardCounts = publicState.playerCardCounts || {};

            // Check transitions for sound effects
            if (lastState.status !== null) {
                // 1. Game Start / New Round
                if (publicState.status === 'active' && (lastState.status !== 'active' || publicState.round !== lastState.round)) {
                    playSound('start.wav');
                }
                
                // 2. Play Card
                else if (lastState.topCard && publicState.topCard && 
                    (lastState.topCard.value !== publicState.topCard.value || lastState.topCard.color !== publicState.topCard.color)) {
                    
                    const cardVal = publicState.topCard.value;
                    if (cardVal === 'DrawTwo' || cardVal === 'WildDrawFour') {
                        playSound('penalty.wav');
                        if (Arcade.haptics) Arcade.haptics.trigger('error');
                    } else if (cardVal === 'Skip') {
                        playSound('skip.wav');
                        if (Arcade.haptics) Arcade.haptics.trigger('card_play');
                    } else if (cardVal === 'Reverse') {
                        playSound('reverse.wav');
                        if (Arcade.haptics) Arcade.haptics.trigger('card_play');
                    } else if ((cardVal === '0' || cardVal === '7') && publicState.settings && publicState.settings.sevenZero) {
                        playSound('swap.wav');
                        if (Arcade.haptics) Arcade.haptics.trigger('card_play');
                    } else {
                        playSound('play.wav');
                        if (Arcade.haptics) Arcade.haptics.trigger('card_play');
                    }
                }
                
                // 3. Draw Card
                else {
                    let cardDrawn = false;
                    for (let pid in cardCounts) {
                        const prevCount = lastState.cardCounts[pid] || 0;
                        const newCount = cardCounts[pid] || 0;
                        if (newCount > prevCount && prevCount > 0) {
                            cardDrawn = true;
                            break;
                        }
                    }
                    if (cardDrawn && lastState.status === 'active' && publicState.status === 'active') {
                        playSound('draw.wav');
                        if (Arcade.haptics) Arcade.haptics.trigger('card_draw');
                    }
                }

                // 4. Turn Start Alert
                const isMyTurn = publicState.currentPlayerId === player.id;
                const wasMyTurn = lastState.currentPlayerId === player.id;
                if (isMyTurn && !wasMyTurn && publicState.status === 'active') {
                    playSound('turn.wav');
                    if (Arcade.haptics) Arcade.haptics.trigger('turn');
                }

                // 5. Victory / Match Completion
                if (publicState.status === 'finished' && lastState.status !== 'finished') {
                    playSound('win.wav');
                    if (Arcade.haptics) Arcade.haptics.trigger('win');
                }

                // 6. UNO Called Feedback
                const prevUnoDeclared = lastState.unoDeclared || {};
                const currentUnoDeclared = publicState.unoDeclared || {};
                let unoCalledThisFrame = false;
                for (let pid in currentUnoDeclared) {
                    if (currentUnoDeclared[pid] && !prevUnoDeclared[pid]) {
                        unoCalledThisFrame = true;
                        break;
                    }
                }
                if (unoCalledThisFrame) {
                    if (Arcade.haptics) Arcade.haptics.trigger('achievement');
                }
            } else {
                // First render sound trigger
                if (publicState.status === 'active') {
                    playSound('start.wav');
                    if (publicState.currentPlayerId === player.id) {
                        playSound('turn.wav');
                        if (Arcade.haptics) Arcade.haptics.trigger('turn');
                    }
                }
            }

            // Save state for next update
            lastState.status = publicState.status;
            lastState.round = publicState.round;
            lastState.topCard = publicState.topCard ? { ...publicState.topCard } : null;
            lastState.currentPlayerId = publicState.currentPlayerId;
            lastState.direction = publicState.direction;
            lastState.cardCounts = { ...cardCounts };
            lastState.unoDeclared = { ...publicState.unoDeclared };

            // 1. Winner Check
            const finishedPlayers = publicState.finishedPlayers || [];
            if (publicState.status === 'finished' && finishedPlayers.length > 0) {
                const placementList = document.getElementById('placement-list');
                if (placementList) {
                    placementList.innerHTML = finishedPlayers.map((pid, idx) => {
                        const name = room.players.find(p => p.id === pid)?.name || 'Unknown';
                        const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '👤';
                        return `
                            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);">
                                <span style="font-weight:bold; color:#f8fafc;">${medal} ${idx + 1}${getOrdinal(idx + 1)} Place</span>
                                <span style="font-weight:900; color:#fbbf24;">${name.toUpperCase()}</span>
                            </div>
                        `;
                    }).join('');
                }

                const isHost = player.id === room.hostId;
                const redirectBtn = document.getElementById('lobby-redirect-btn');
                if (redirectBtn) {
                    if (isHost) {
                        redirectBtn.style.display = 'block';
                    } else {
                        redirectBtn.style.display = 'none';
                    }
                }

                document.getElementById('winner-overlay').style.display = 'flex';
                return;
            } else {
                document.getElementById('winner-overlay').style.display = 'none';
            }

            // 2. Update Leaderboard
            updateLeaderboardPanel();

            // 3. Update Timer Badge
            const timerEl = document.getElementById('timer-indicator');
            if (publicState.turnTimer > 0 && publicState.timerRemaining > 0 && publicState.status === 'active') {
                timerEl.style.display = 'block';
                timerEl.textContent = '⏳ ' + Math.ceil(publicState.timerRemaining) + 's';
                if (publicState.timerRemaining <= 5) {
                    timerEl.style.color = '#ef4444';
                } else {
                    timerEl.style.color = '#94a3b8';
                }
            } else {
                timerEl.style.display = 'none';
            }

            // 4. Update Turn Status
            const isMyTurn = publicState.currentPlayerId === player.id;

            // 5. Render Opponents
            const others = room.players.filter(p => p.id !== player.id);
            const total = others.length;
            const scale = total > 7 ? 'transform: translate(-50%, -50%) scale(0.75)' : total > 4 ? 'transform: translate(-50%, -50%) scale(0.9)' : 'transform: translate(-50%, -50%)';

            DOM.opponentsContainer.innerHTML = others.map((opp, idx) => {
                let x = 50, y = 15; // default 1 opp
                if (total === 2) { x = idx === 0 ? 20 : 80; y = 30; }
                else if (total === 3) { x = idx === 0 ? 15 : idx === 1 ? 50 : 85; y = idx === 1 ? 15 : 40; }
                else if (total > 3) {
                    const startAngle = Math.PI * 0.95;
                    const endAngle = Math.PI * 0.05;
                    const angle = startAngle - (idx * ((startAngle - endAngle) / (total - 1)));
                    x = 50 + 44 * Math.cos(angle);
                    y = 45 - 36 * Math.sin(angle);
                }

                const isActive = publicState.currentPlayerId === opp.id;
                const badgeCount = cardCounts[opp.id] || 0;
                let initial = opp.name.startsWith('Bot ') ? opp.name.replace('Bot ', 'B') : opp.name.substring(0, 2).toUpperCase();
                
                const isFinished = finishedPlayers.includes(opp.id);
                const placementIdx = finishedPlayers.indexOf(opp.id);
                const placementText = placementIdx !== -1 ? `${placementIdx + 1}${getOrdinal(placementIdx + 1)}` : '';
                
                let badgeHTML = '';
                if (isFinished) {
                    badgeHTML = `<span style="color:#fbbf24; font-weight:bold; font-size:10px;">🏆 ${placementText}</span>`;
                } else {
                    badgeHTML = `
                        <div class="badge-icon"></div>
                        <span style="color:white; font-weight:bold;">${badgeCount}</span>
                    `;
                }

                return `
                    <div class="avatar-node ${isActive ? 'active' : ''}" style="left: ${x}%; top: ${y}%; ${scale}; z-index: ${isActive ? 50 : 10}">
                        <div style="position:relative">
                            <div class="avatar-spinner"></div>
                            <div class="avatar-circle">${initial}</div>
                            <div class="avatar-badge" style="display:flex; align-items:center; justify-content:center;">
                                ${badgeHTML}
                            </div>
                        </div>
                        <div style="margin-top: 4px; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; font-size: 10px; white-space: nowrap;">${opp.name}</div>
                    </div>
                `;
            }).join('');

            // 6. Render Hand
            const hand = privateState?.hand || [];
            const isLocalFinished = finishedPlayers.includes(player.id);

            const isSpectator = !room.players.some(p => p.id === player.id);

            if (isSpectator) {
                DOM.handContainer.style.overflowX = 'visible';
                DOM.handContainer.style.justifyContent = 'center';
                DOM.handContainer.style.paddingLeft = '0';
                DOM.handContainer.style.paddingRight = '0';
                DOM.handContainer.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; height:120px; width:100%; color:#94a3b8; background:rgba(15,23,42,0.6); border-radius:16px; border:2px dashed rgba(255,255,255,0.1); margin: 0 20px;">
                        <span style="font-size: 28px;">👁️</span>
                        <span style="font-weight:900; font-size:16px; text-transform:uppercase; letter-spacing:1px;">👁️ SPECTATING MATCH</span>
                        <span style="color:#64748b; font-size:12px;">You joined mid-game and are watching.</span>
                    </div>
                `;
            } else if (isLocalFinished) {
                const placementIdx = finishedPlayers.indexOf(player.id);
                const placementText = placementIdx !== -1 ? `${placementIdx + 1}${getOrdinal(placementIdx + 1)}` : '';
                DOM.handContainer.style.overflowX = 'visible';
                DOM.handContainer.style.justifyContent = 'center';
                DOM.handContainer.style.paddingLeft = '0';
                DOM.handContainer.style.paddingRight = '0';
                DOM.handContainer.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; height:120px; width:100%; color:#fbbf24;">
                        <span style="font-size: 32px;">🏆</span>
                        <span style="font-weight:900; font-size:20px; text-transform:uppercase;">FINISHED ${placementText} PLACE!</span>
                        <span style="color:#94a3b8; font-size:12px;">Spectating remaining players...</span>
                    </div>
                `;
            } else if (hand.length > 15) {
                // Horizontal scrolling layout for high card counts
                DOM.handContainer.style.overflowX = 'auto';
                DOM.handContainer.style.justifyContent = 'flex-start';
                DOM.handContainer.style.paddingLeft = '40px';
                DOM.handContainer.style.paddingRight = '40px';
                
                DOM.handContainer.innerHTML = hand.map((card, idx) => {
                    const playable = isCardPlayable(card, publicState, isMyTurn);
                    const isSelected = selectedCardIdx === idx;
                    const extraStyle = isSelected ? 'transform: translateY(-30px) scale(1.1); z-index: 1000; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6); margin-right: 12px;' : '';
                    return `
                        <div class="hand-card-scroll-slot" style="position: relative; margin-left: ${idx === 0 ? 0 : -24}px; z-index: ${idx}">
                            <div style="pointer-events: auto;">
                                ${createCardHTML(card, 'lg', false, playable, extraStyle, idx)}
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                // Centered dynamic fanning layout
                DOM.handContainer.style.overflowX = 'visible';
                DOM.handContainer.style.justifyContent = 'center';
                DOM.handContainer.style.paddingLeft = '0';
                DOM.handContainer.style.paddingRight = '0';
                
                const maxSpread = window.innerWidth < 600 ? 25 : 45;
                const spread = Math.min(maxSpread, (window.innerWidth - 120) / hand.length);

                DOM.handContainer.innerHTML = hand.map((card, idx) => {
                    const offset = idx - (hand.length - 1) / 2;
                    const x = offset * spread;
                    const rot = offset * (hand.length > 15 ? 1 : 3);
                    
                    const isSelected = selectedCardIdx === idx;
                    const y = Math.abs(offset) * 2 - (isSelected ? 30 : 0);
                    const extraStyle = isSelected ? 'transform: scale(1.1); z-index: 1000; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);' : '';

                    const playable = isCardPlayable(card, publicState, isMyTurn);

                    return `
                        <div class="hand-slot" style="transform: translateX(${x}px) translateY(${y}px) rotate(${rot}deg); z-index: ${isSelected ? 1000 : idx}">
                            <div style="pointer-events: auto;">
                                ${createCardHTML(card, 'lg', false, playable, extraStyle, idx)}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Render local avatar's spinner, circle, and badge count/placement
            const localPlacementIdx = finishedPlayers.indexOf(player.id);
            const localPlacementText = localPlacementIdx !== -1 ? `${localPlacementIdx + 1}${getOrdinal(localPlacementIdx + 1)}` : '';
            const localBadgeCount = hand.length;

            let localBadgeHTML = '';
            if (isLocalFinished) {
                localBadgeHTML = `<span style="color:#fbbf24; font-weight:bold; font-size:10px;">🏆 ${localPlacementText}</span>`;
            } else {
                localBadgeHTML = `
                    <div class="badge-icon"></div>
                    <span style="color:white; font-weight:bold;">${localBadgeCount}</span>
                `;
            }

            DOM.localAvatar.innerHTML = `
                <div style="position:relative">
                    <div class="avatar-spinner"></div>
                    <div class="avatar-circle">YOU</div>
                    <div class="avatar-badge" style="display:flex; align-items:center; justify-content:center;">
                        ${localBadgeHTML}
                    </div>
                </div>
            `;

            if (isMyTurn) DOM.localAvatar.classList.add('active');
            else DOM.localAvatar.classList.remove('active');

            const unoDeclared = publicState.unoDeclared || {};
            if (hand.length === 2 || (hand.length === 1 && !unoDeclared[player.id])) {
                DOM.unoBtn.classList.add('ready');
            } else {
                DOM.unoBtn.classList.remove('ready');
            }

            // 7. Render Center Pile (Deck Pile and Discard Pile)
            DOM.deckPile.className = isMyTurn ? 'active-turn' : '';
            const deckSize = publicState.deckCount || 108;
            DOM.deckPile.innerHTML = `
                <div style="position:absolute; top:4px; left:4px; filter:brightness(0.4)">${createCardHTML({}, 'sm', true)}</div>
                <div style="position:absolute; top:2px; left:2px; filter:brightness(0.6)">${createCardHTML({}, 'sm', true)}</div>
                <div style="position:relative; ${isMyTurn ? 'box-shadow: 0 0 15px rgba(74,222,128,0.5); border-radius: 8px;' : ''}">${createCardHTML({}, 'sm', true)}</div>
                <div class="deck-count">(${deckSize})</div>
            `;

            if (publicState.topCard) {
                const displayCard = {
                    ...publicState.topCard,
                    color: publicState.topCard.color === 'Wild' ? publicState.currentColor : publicState.topCard.color
                };
                const hashRot = (displayCard.value.charCodeAt(0) + displayCard.color.charCodeAt(0)) % 20 - 10;
                DOM.discardPile.innerHTML = `
                    <div style="position:absolute; transform: translate(-4px, 4px) rotate(-10deg); filter:brightness(0.4)">${createCardHTML({}, 'sm', true)}</div>
                    <div style="position:absolute; transform: translate(4px, -4px) rotate(8deg); filter:brightness(0.6)">${createCardHTML({}, 'sm', true)}</div>
                    <div style="position:absolute; transform: rotate(${hashRot}deg); z-index: 10;">
                        ${createCardHTML(displayCard, 'sm')}
                    </div>
                `;
            } else {
                DOM.discardPile.innerHTML = '';
            }

            if (publicState.direction === 1) {
                DOM.dirRing.className = 'direction-ring spin-cw';
            } else {
                DOM.dirRing.className = 'direction-ring spin-ccw';
            }

            const actionsEl = document.getElementById('uno-actions');
            actionsEl.innerHTML = '';
            const uncaughtOpps = room.players.filter(p => p.id !== player.id && cardCounts[p.id] === 1 && !unoDeclared[p.id]);
            const now = Date.now();

            // Track when each opponent first became catchable
            const currentCatchableIds = new Set(uncaughtOpps.map(o => o.id));
            // Add new catchable opponents
            uncaughtOpps.forEach(opp => {
                if (!catchableTimestamps[opp.id]) {
                    catchableTimestamps[opp.id] = now;
                }
            });
            // Clean up opponents no longer catchable
            Object.keys(catchableTimestamps).forEach(id => {
                if (!currentCatchableIds.has(id)) {
                    delete catchableTimestamps[id];
                }
            });

            uncaughtOpps.forEach(opp => {
                const elapsed = now - (catchableTimestamps[opp.id] || now);
                if (elapsed < 2000) return; // 2-second activation delay

                const shortName = opp.name.length > 6 ? opp.name.substring(0, 5) + '!' : opp.name + '!';
                const btn = document.createElement('button');
                btn.className = 'catch-btn';
                btn.textContent = `CATCH ${shortName.toUpperCase()}`;
                btn.onclick = (e) => {
                    e.preventDefault();
                    safeAction('CATCH_UNO', { targetId: opp.id });
                };
                actionsEl.appendChild(btn);
            });

            // If there are catchable opps still in delay, schedule a re-render
            if (uncaughtOpps.some(opp => (now - (catchableTimestamps[opp.id] || now)) < 2000)) {
                setTimeout(updateUI, 500);
            }
        }

        // --- WINDOW EVENTS ---
        window.addEventListener('resize', () => {
            updateUI();
        });

        // --- INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', () => {
            const redirectBtn = document.getElementById('lobby-redirect-btn');
            if (redirectBtn) {
                redirectBtn.onclick = () => {
                    if (Arcade && typeof Arcade.returnToLobby === 'function') {
                        Arcade.returnToLobby();
                    }
                };
            }
            
            if (Arcade) {
                Arcade.onUpdate(updateUI);
                updateUI();
            }
        });
    </script>
</body>
</html>
