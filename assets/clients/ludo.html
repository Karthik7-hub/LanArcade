<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Classic - LAN Arcade</title>
    <style>
        @font-face {
            font-family: 'Outfit';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('/fonts/outfit-400.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Outfit';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('/fonts/outfit-600.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Outfit';
            font-style: normal;
            font-weight: 800;
            font-display: swap;
            src: url('/fonts/outfit-800.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Outfit';
            font-style: normal;
            font-weight: 900;
            font-display: swap;
            src: url('/fonts/outfit-900.woff2') format('woff2');
        }

        /* ============================================================
           DESIGN TOKENS
           ============================================================ */
        :root {
            --red: #e63946;
            --red-light: #ff6b6b;
            --red-dark: #b5202d;
            --green: #2ec474;
            --green-light: #5dde9e;
            --green-dark: #1a9c55;
            --yellow: #f5a623;
            --yellow-light: #ffd166;
            --yellow-dark: #c48600;
            --blue: #3b82f6;
            --blue-light: #60a5fa;
            --blue-dark: #1d4ed8;

            --bg-table: radial-gradient(circle at center, #25140b 0%, #0d0603 100%);
            --font: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;

            --board-size: 320px; /* Settled dynamically */
            --cell-size: calc(var(--board-size) / 15);
        }

        /* ============================================================
           BASE RESET
           ============================================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg-table);
            color: #fff;
            font-family: var(--font);
            overflow: hidden;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================================
           GAME CONTAINER & LAYOUT
           ============================================================ */
        #game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            padding: 4px;
            position: relative;
        }

        #game-layout {
            position: relative;
            width: var(--board-size);
            height: var(--board-size);
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Camera shakes & victory zoom */
        .camera-shake {
            animation: camera-shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes camera-shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-2px, 1px); }
            20%, 40%, 60%, 80% { transform: translate(2px, -1px); }
        }

        .victory-zoom {
            transform: scale(1.06);
        }

        #board-area {
            width: 100%;
            height: 100%;
            transform: rotate(var(--board-rotation, 0deg));
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ============================================================
           WOODEN BOARD WRAPPER
           ============================================================ */
        #board-wrapper {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4d2b18 0%, #351c0f 50%, #201008 100%);
            border-radius: 16px;
            border: 5px solid #2d160b;
            box-shadow:
                0 12px 36px rgba(0, 0, 0, 0.55),
                0 20px 50px rgba(0, 0, 0, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.15),
                inset 0 -2px 4px rgba(0, 0, 0, 0.6),
                inset 0 0 15px rgba(0, 0, 0, 0.85);
            padding: 6px;
            position: relative;
            outline: 2px solid #bda36e;
            outline-offset: -5px;
            transition: transform 0.3s ease;
        }



        #ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 100%;
            height: 100%;
            gap: 1.5px;
            background: #2b160b; /* Tile separators as dark wooden slots */
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
        }

        /* ============================================================
           BOARD TILES & PATHS
           ============================================================ */
        .cell {
            background: #fcf9f2;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 3px rgba(0, 0, 0, 0.08);
            border-radius: 2px;
        }

        .cell-safe::after {
            content: "★";
            color: rgba(35, 21, 10, 0.25);
            font-size: calc(var(--board-size) / 24);
            position: absolute;
            font-weight: 900;
            pointer-events: none;
        }

        .path-red { background: radial-gradient(circle, var(--red-light), var(--red)); }
        .path-green { background: radial-gradient(circle, var(--green-light), var(--green)); }
        .path-yellow { background: radial-gradient(circle, var(--yellow-light), var(--yellow)); }
        .path-blue { background: radial-gradient(circle, var(--blue-light), var(--blue)); }

        .cell-red-safe::after { content: "➔"; color: #fff !important; transform: rotate(0deg); font-size: calc(var(--board-size) / 22); filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35)); opacity: 0.9; }
        .cell-green-safe::after { content: "➔"; color: #fff !important; transform: rotate(90deg); font-size: calc(var(--board-size) / 22); filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35)); opacity: 0.9; }
        .cell-yellow-safe::after { content: "➔"; color: #fff !important; transform: rotate(180deg); font-size: calc(var(--board-size) / 22); filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35)); opacity: 0.9; }
        .cell-blue-safe::after { content: "➔"; color: #fff !important; transform: rotate(270deg); font-size: calc(var(--board-size) / 22); filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35)); opacity: 0.9; }

        /* Recessed Bases */
        .base-red, .base-green, .base-yellow, .base-blue {
            position: relative;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.45);
            border: 2.5px solid #2d160b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .base-red { background: linear-gradient(135deg, #b5202d, #701017); grid-area: 1 / 1 / 7 / 7; border-radius: 8px 0 0 0; }
        .base-green { background: linear-gradient(135deg, #1a9c55, #0d5e2e); grid-area: 1 / 10 / 7 / 16; border-radius: 0 8px 0 0; }
        .base-yellow { background: linear-gradient(225deg, #c48600, #734f00); grid-area: 10 / 10 / 16 / 16; border-radius: 0 0 8px 0; }
        .base-blue { background: linear-gradient(45deg, #2b5cd4, #12379c); grid-area: 10 / 1 / 16 / 7; border-radius: 0 0 0 8px; }

        .yard-inner {
            width: 76%;
            height: 76%;
            background: radial-gradient(circle, #FAF5E6 50%, #e2d7ba 100%);
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            padding: 8%;
            gap: 12%;
            box-shadow:
                inset 0 3px 6px rgba(0,0,0,0.3),
                inset 0 -1.5px 3px rgba(255,255,255,0.45);
            border: 2px solid #2d160b;
        }

        .yard-dot {
            border-radius: 50%;
            box-shadow:
                inset 0 2px 4px rgba(0,0,0,0.3),
                0 1px 1px rgba(255,255,255,0.5);
            border: 1.5px solid rgba(0,0,0,0.12);
        }

        .yard-dot.red { background: radial-gradient(circle at 35% 35%, var(--red-light), var(--red-dark)); }
        .yard-dot.green { background: radial-gradient(circle at 35% 35%, var(--green-light), var(--green-dark)); }
        .yard-dot.yellow { background: radial-gradient(circle at 35% 35%, var(--yellow-light), var(--yellow-dark)); }
        .yard-dot.blue { background: radial-gradient(circle at 35% 35%, var(--blue-light), var(--blue-dark)); }

        /* Home Triangles */
        .home-center {
            grid-area: 7 / 7 / 10 / 10;
            background: #2d160b;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            border: 1.5px solid #2d160b;
        }

        .home-center-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ============================================================
           PLAYER CARD LAYOUT & STYLING
           ============================================================ */
        .player-slot {
            position: absolute;
            z-index: 100;
        }

        /* Portrait positioning */
        .is-portrait .slot-top { top: -80px; left: 50%; transform: translateX(-50%); }
        .is-portrait .slot-bottom { bottom: -80px; left: 50%; transform: translateX(-50%); }
        .is-portrait .slot-left { left: -80px; top: 50%; transform: translateY(-50%); }
        .is-portrait .slot-right { right: -80px; top: 50%; transform: translateY(-50%); }

        /* 3-Player layout adjustments for portrait */
        .is-portrait.layout-3 .slot-bottom { bottom: -80px; right: 0; left: auto; transform: none; }
        .is-portrait.layout-3 .slot-left { bottom: -80px; left: 0; top: auto; transform: none; }

        /* Landscape positioning */
        .is-landscape .slot-top { top: -80px; left: 50%; transform: translateX(-50%); }
        .is-landscape .slot-bottom { bottom: -80px; left: 50%; transform: translateX(-50%); }
        .is-landscape .slot-left { left: -80px; top: 50%; transform: translateY(-50%); }
        .is-landscape .slot-right { right: -80px; top: 50%; transform: translateY(-50%); }

        /* 3-Player layout adjustments for landscape */
        .is-landscape.layout-3 .slot-bottom { bottom: -80px; right: 10px; left: auto; transform: none; }
        .is-landscape.layout-3 .slot-left { bottom: -80px; left: 10px; top: auto; transform: none; }

        .player-card {
            background: rgba(17, 26, 46, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            border-radius: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease, opacity 0.3s ease;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Colors indicators on active status */
        .player-card.color-red.active { border-color: var(--red); box-shadow: 0 0 16px rgba(230, 57, 70, 0.35); }
        .player-card.color-green.active { border-color: var(--green); box-shadow: 0 0 16px rgba(46, 196, 116, 0.35); }
        .player-card.color-yellow.active { border-color: var(--yellow); box-shadow: 0 0 16px rgba(240, 165, 0, 0.35); }
        .player-card.color-blue.active { border-color: var(--blue); box-shadow: 0 0 16px rgba(59, 130, 246, 0.35); }

        /* Horizontal Capsule (Top & Bottom Slots) */
        .player-card.horizontal {
            width: 220px;
            height: 68px;
            padding: 6px 10px;
        }

        .player-card.horizontal .card-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .player-card.horizontal .card-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex: 1;
            min-width: 0;
        }

        /* Vertical Capsule (Left & Right Slots) */
        .player-card.vertical {
            width: 68px;
            height: 220px;
            flex-direction: column;
            padding: 10px 6px;
        }

        .player-card.vertical .card-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            flex: 1;
            justify-content: flex-start;
            min-height: 0;
        }

        .player-card.vertical .card-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            justify-content: flex-end;
            min-height: 0;
        }

        /* Capsule Interior Parts */
        .player-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #27354f;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 900;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            position: relative;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .color-red .player-avatar { border-color: var(--red); color: var(--red-light); }
        .color-green .player-avatar { border-color: var(--green); color: var(--green-light); }
        .color-yellow .player-avatar { border-color: var(--yellow); color: var(--yellow-light); }
        .color-blue .player-avatar { border-color: var(--blue); color: var(--blue-light); }

        .player-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #475569;
            position: absolute;
            bottom: -1px;
            right: -1px;
            border: 1px solid #080d1a;
        }

        .player-status-dot.online {
            background: var(--green);
            box-shadow: 0 0 4px var(--green);
        }

        .player-name {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
            color: #cbd5e1;
        }

        .pieces-remaining {
            font-size: 18px;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            color: #fff;
        }

        .pieces-left-label {
            font-size: 8px;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
        }

        /* ============================================================
           DICE AREA & RING TIMERS
           ============================================================ */
        .player-dice-container {
            width: 68px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .timer-ring-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 68px;
            height: 68px;
            transform: rotate(-90deg);
            z-index: 10;
            pointer-events: none;
        }

        .timer-ring-bg {
            stroke: rgba(255,255,255,0.08);
        }

        .timer-ring-bar {
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
        }

        .timer-seconds-text {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            background: rgba(8, 14, 26, 0.85);
            padding: 2px 5px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.12);
            pointer-events: none;
            font-variant-numeric: tabular-nums;
        }

        .inactive-dice-val {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.45);
        }

        /* 3D Dice Box */
        .dice-wrapper {
            perspective: 400px;
            width: 68px;
            height: 68px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 8;
        }

        .dice {
            width: 38px;
            height: 38px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1.15);
        }

        .dice-face {
            position: absolute;
            width: 38px;
            height: 38px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #ffffff, #eae6e1);
            border: 1px solid #cac6c1;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 2px 4px rgba(0,0,0,0.2);
        }

        .face-1 { transform: rotateY(0deg) translateZ(19px); }
        .face-6 { transform: rotateY(180deg) translateZ(19px); }
        .face-2 { transform: rotateY(90deg) translateZ(19px); }
        .face-5 { transform: rotateY(-90deg) translateZ(19px); }
        .face-3 { transform: rotateX(90deg) translateZ(19px); }
        .face-4 { transform: rotateX(-90deg) translateZ(19px); }

        .pip-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 75%;
            height: 75%;
        }

        .pip {
            width: 5.5px;
            height: 5.5px;
            margin: auto;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #333, #000);
        }

        @keyframes roll-spin {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            30% { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
            60% { transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
            85% { transform: rotateX(900deg) rotateY(540deg) rotateZ(270deg); }
            100% { transform: rotateX(1080deg) rotateY(720deg) rotateZ(360deg); }
        }

        @keyframes dice-throw-bounce {
            0% { transform: translateY(0) scale(1); }
            20% { transform: translateY(-12px) scale(1.1); }
            45% { transform: translateY(0) scale(0.95); }
            65% { transform: translateY(-5px) scale(1.05); }
            80% { transform: translateY(0) scale(0.98); }
            100% { transform: translateY(0) scale(1); }
        }

        .dice-rolling {
            animation: roll-spin 0.7s cubic-bezier(0.3, 0, 0.2, 1);
        }

        .dice-thump {
            animation: dice-throw-bounce 0.7s ease-out;
        }

        .dice-active-glow {
            animation: active-dice-pulsate 1.8s ease-in-out infinite;
        }

        @keyframes active-dice-pulsate {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.15)); }
            50% { filter: drop-shadow(0 0 8px rgba(255,255,255,0.45)); }
        }

        /* ============================================================
           DYNAMICAL TOKENS (FIGURINES)
           ============================================================ */
        #tokens-layer {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(100% - 12px);
            height: calc(100% - 12px);
            pointer-events: none;
            z-index: 50;
        }

        .token {
            position: absolute;
            z-index: 50;
            cursor: pointer;
            pointer-events: none;
            will-change: transform, left, top;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: visible;
            transform: translate(-50%, -50%);
        }

        .doll-uprighter {
            width: 100%;
            height: 100%;
            transform: rotate(var(--counter-rotate, 0deg));
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: visible;
        }

        .doll-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transform-origin: bottom center;
            overflow: visible;
        }

        /* 1. Ground shadow */
        .doll-shadow {
            position: absolute;
            width: 70%;
            height: 12%;
            background: rgba(40, 20, 10, 0.4);
            border-radius: 50%;
            bottom: -2%;
            left: 15%;
            z-index: 1;
            filter: blur(2px);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .doll-body {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transform-origin: bottom center;
            z-index: 2;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25)) drop-shadow(0 0 1px rgba(0,0,0,0.5));
        }

        /* HEAD */
        .doll-head {
            width: 60%;
            height: 38%;
            background: radial-gradient(circle at 35% 30%, #ffe8d1, #f5cbb0);
            border-radius: 50%;
            position: relative;
            z-index: 5;
            flex-shrink: 0;
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.6), inset -1px -1px 2px rgba(0,0,0,0.1);
        }

        .doll-face {
            position: absolute;
            top: 40%;
            left: 15%;
            width: 70%;
            height: 30%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .doll-eye {
            width: 5px;
            height: 5px;
            background: #2b2b2b;
            border-radius: 50%;
            position: relative;
        }

        /* TORSO (soft hoodie) */
        .doll-torso {
            width: 65%;
            height: 36%;
            border-radius: 12px 12px 6px 6px;
            position: relative;
            z-index: 4;
            margin-top: -8%;
            flex-shrink: 0;
            background: radial-gradient(circle at 35% 30%, var(--doll-light), var(--doll-dark));
            box-shadow: inset 1px 2px 3px rgba(255,255,255,0.4), inset -1px -2px 3px rgba(0,0,0,0.2);
        }

        /* ARMS */
        .doll-arm {
            position: absolute;
            width: 20%;
            height: 70%;
            border-radius: 10px;
            top: 10%;
            z-index: 3;
            transform-origin: top center;
            background: radial-gradient(circle at 35% 35%, var(--doll-light), var(--doll-dark));
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.3), inset -1px -1px 2px rgba(0,0,0,0.15);
        }

        .doll-arm.arm-left {
            left: -12%;
            transform: rotate(10deg);
        }

        .doll-arm.arm-right {
            right: -12%;
            transform: rotate(-10deg);
        }

        /* LEGS */
        .doll-legs {
            display: flex;
            justify-content: center;
            gap: 12%;
            width: 55%;
            height: 20%;
            position: relative;
            z-index: 3;
            margin-top: -6%;
            flex-shrink: 0;
        }

        .doll-leg {
            width: 40%;
            height: 100%;
            border-radius: 6px;
            transform-origin: top center;
            background: linear-gradient(to bottom, var(--doll-pants), color-mix(in srgb, var(--doll-pants) 70%, #000));

            from { transform: rotate(-10deg); }

        .doll-wrapper.walking .arm-right {

            animation: doll-leg-walk-L 0.44s ease-in-out infinite alternate;

            to { transform: rotate(-18deg); }

            to { transform: rotate(18deg); }

            to { transform: rotate(-15deg); }
        }
        @keyframes doll-leg-walk-R {
            from { transform: rotate(-15deg); }
            to { transform: rotate(15deg); }

    <script>
        (function () {
            var cachedRoom = null;
            var cachedPlayer = null;
            var cachedPublicState = null;
            var cachedPrivateState = null;
            var updateCallbacks = [];

            window.addEventListener('message', function (event) {
                var msg = event.data;
                if (!msg || typeof msg !== 'object') return;

                if (msg.type === 'arcade:update') {
                    cachedRoom = msg.room;
                    cachedPlayer = msg.player;
                    cachedPublicState = msg.publicState;
                    cachedPrivateState = msg.privateState;

                    for (var i = 0; i < updateCallbacks.length; i++) {
                        try {
                            updateCallbacks[i]();
                        } catch (e) {
                            console.error("Error in Arcade update callback:", e);
                        }
                    }
                }
            });

            window.Arcade = {
                getRoom: function () { return cachedRoom; },
                getPlayer: function () { return cachedPlayer; },
                getPublicState: function () { return cachedPublicState; },
                getPrivateState: function () { return cachedPrivateState; },

                sendAction: function (type, data) {
                    window.parent.postMessage({
                        type: 'arcade:action',
                        actionType: type,
                        actionData: data
                    }, '*');
                },

                haptics: {
                    trigger: function (type) {
                        window.parent.postMessage({
                            type: 'arcade:haptic',
                            hapticType: type
                        }, '*');
                    }
                },

                returnToLobby: function () {
                    window.parent.postMessage({
                        type: 'arcade:reset'
                    }, '*');
                },

                audio: {
                    play: function (soundName) {
                        window.parent.postMessage({
                            type: 'arcade:play_sound',
                            soundName: soundName
                        }, '*');
                    }
                },

                onUpdate: function (callback) {
                    updateCallbacks.push(callback);
                    return function () {
                        updateCallbacks = updateCallbacks.filter(function (cb) { return cb !== callback; });
                    };
                }
            };

            window.parent.postMessage({ type: 'arcade:init' }, '*');
        })();

        const Arcade = window.Arcade;
    </script>
