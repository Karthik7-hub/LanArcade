        const START_TILES = { red: 0, green: 13, yellow: 26, blue: 39 };

        const diceRotations = {
            1: 'rotateX(0deg) rotateY(0deg)',
            2: 'rotateY(-90deg)',
            3: 'rotateX(-90deg)',
            4: 'rotateX(90deg)',
            5: 'rotateY(90deg)',
            6: 'rotateY(180deg)'
        };

        // ---- STATE ----
        let lastDiceVal = null;
        let isDiceLocalAnimation = false;
        let isDiceRolling = false;
        let lastProcessedLog = [];
        let shownVictory = false;
        let tokenElements = {};
        let animationQueue = Promise.resolve();
        let prevDiceRolled = false;
        const lastRolledValues = { red: null, green: null, yellow: null, blue: null };
        let hasAutoMovedThisTurn = false;
        let animatingTokens = new Set();
        let prevTokenState = null;

        // ---- LOCAL TIMER INTERPOLATION ----
        let timerServerRemaining = 30;
        let timerServerTimestamp = 0;
        let timerTickRunning = false;

        // ---- 2. AUDIO & HAPTICS MANAGER ----
        const AudioManager = {
            play(soundName) {
                if (Arcade && Arcade.audio && typeof Arcade.audio.play === 'function') {
                    Arcade.audio.play(soundName);
                }
            },
            playWalk() { this.play('hop'); },
            playRoll() { this.play('roll'); },
            playSelect() { this.play('hop'); },
            playCapture() { this.play('capture'); },
            playWin() { this.play('win'); },
            playClick() { this.play('hop'); }
        };

        const HapticsManager = {
            trigger(type) {
                if (Arcade && Arcade.haptics && typeof Arcade.haptics.trigger === 'function') {
                    Arcade.haptics.trigger(type);
                }
            },
            light() { this.trigger('click'); },
            medium() { this.trigger('selection'); },
            heavy() { this.trigger('heavy'); },
            success() { this.trigger('success'); }
        };

        // ---- 3. TOAST SYSTEM (disabled — notifications removed) ----
        function showToast(message, type = 'info') {
            // Notifications disabled per design: board is the focus
            return;
        }

        // ---- 4. REPLAY LOG PARSER ----
        function processLogChanges(newLog) {
            if (!newLog || newLog.length === 0) return;

            // Find new logs (inserted at index 0 or appended depending on engine sync)
            const newEntries = [];
            for (let i = 0; i < newLog.length; i++) {
                if (lastProcessedLog.includes(newLog[i])) break;
                newEntries.push(newLog[i]);
            }

            newEntries.reverse().forEach(msg => {
                let type = 'info';
                if (msg.toLowerCase().includes('captured')) type = 'capture';
                else if (msg.toLowerCase().includes('home')) type = 'home';
                else if (msg.toLowerCase().includes('winner') || msg.toLowerCase().includes('finished')) type = 'victory';
                else if (msg.toLowerCase().includes('extra roll')) type = 'extra';

                // Filters
                if (msg.includes('Auto-rolled') ||
                    msg.includes('timed out') ||
                    msg.includes('No legal moves') ||
                    msg.includes('Game Started') ||
                    msg.toLowerCase().includes('rolled')) {
                    return;
                }

                showToast(msg, type);
            });

            lastProcessedLog = [...newLog];
        }

        // ---- 5. PARTICLES ENGINE ----
        const PARTICLE_POOL_SIZE = 100;
        const particlePool = [];
        for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
            particlePool.push({ x: 0, y: 0, vx: 0, vy: 0, size: 0, color: '', alpha: 0, decay: 0, active: false });
        }

        let particleAnimating = false;

        function resizeParticlesCanvas() {
            const wrapper = document.getElementById('board-wrapper');
            if (wrapper && (particlesCanvas.width !== wrapper.offsetWidth || particlesCanvas.height !== wrapper.offsetHeight)) {
                particlesCanvas.width = wrapper.offsetWidth;
                particlesCanvas.height = wrapper.offsetHeight;
            }
        }

        function spawnParticles(x, y, color, count = 12) {
            resizeParticlesCanvas();
            let spawned = 0;
            for (let i = 0; i < PARTICLE_POOL_SIZE && spawned < count; i++) {
                const p = particlePool[i];
                if (p.active) continue;
                const angle = (Math.PI * 2 / count) * spawned + (Math.random() - 0.5) * 0.5;
                const speed = 1.8 + Math.random() * 2.5;
                p.x = x;
                p.y = y;
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                p.size = 2 + Math.random() * 2.5;
                p.color = color;
                p.alpha = 1;
                p.decay = 0.02 + Math.random() * 0.02;
                p.active = true;
                spawned++;
            }
            if (!particleAnimating) animateParticles();
        }

        function animateParticles() {
            let anyActive = false;
            particlesCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);

            for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
                const p = particlePool[i];
                if (!p.active) continue;

                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08; // gravity
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    p.active = false;
                    continue;
                }

                anyActive = true;
                particlesCtx.globalAlpha = p.alpha;
                particlesCtx.fillStyle = p.color;
                particlesCtx.beginPath();
                particlesCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                particlesCtx.fill();
            }

            particlesCtx.globalAlpha = 1;

            if (anyActive) {
                particleAnimating = true;
                requestAnimationFrame(animateParticles);
            } else {
                particleAnimating = false;
            }
        }

        // ---- 6. BOARD RENDERER ----
        function setupBoard() {
            for (let r = 0; r < 15; r++) {
                for (let c = 0; c < 15; c++) {
                    if (r < 6 && c < 6) continue;
                    if (r < 6 && c >= 9) continue;
                    if (r >= 9 && c >= 9) continue;
                    if (r >= 9 && c < 6) continue;
                    if (r >= 6 && r < 9 && c >= 6 && c < 9) continue;

                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.gridColumn = c + 1;
                    cell.style.gridRow = r + 1;

                    const trackIndex = trackCoords.findIndex(coord => coord[0] === c && coord[1] === r);
                    if (trackIndex !== -1 && safeTiles.includes(trackIndex)) {
                        cell.classList.add('cell-safe');
                        if (trackIndex === 0) cell.classList.add('cell-red-safe');
                        if (trackIndex === 13) cell.classList.add('cell-green-safe');
                        if (trackIndex === 26) cell.classList.add('cell-yellow-safe');
                        if (trackIndex === 39) cell.classList.add('cell-blue-safe');
                    }

                    for (const color in homePaths) {
                        const homeIdx = homePaths[color].findIndex(coord => coord[0] === c && coord[1] === r);
                        if (homeIdx !== -1) cell.classList.add('path-' + color);
                    }

                    grid.appendChild(cell);
                }
            }
        }

        // ---- 7. TOKEN MATH & FIGURINE STRUCTS ----
        function positionToken(el, boardX, boardY, scale) {
            el.style.left = `${(boardX / 15) * 100}%`;
            el.style.top = `${(boardY / 15) * 100}%`;
            el.style.width = `${(scale / 15) * 100}%`;
            el.style.height = `${(scale / 15) * 100}%`;
        }

        function getCharacterHTML() {
            return `
                <div class="doll-uprighter">
                    <div class="doll-wrapper idle-breathe">
                        <div class="doll-shadow"></div>
                        <div class="doll-body">
                            <div class="doll-head">
                                <div class="doll-face">
                                    <div class="doll-eye eye-left"></div>
                                    <div class="doll-eye eye-right"></div>
                                </div>
                            </div>
                            <div class="doll-torso">
                                <div class="doll-arm arm-left"></div>
                                <div class="doll-arm arm-right"></div>
                            </div>
                            <div class="doll-legs">
                                <div class="doll-leg leg-left"></div>
                                <div class="doll-leg leg-right"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getTokenCoord(token, color) {
            if (token.at === 'base') return yardCoords[color][token.id];
            if (token.at === 'track') return trackCoords[token.pos];
            if (token.at === 'homepath') return homePaths[color][token.pos];
            if (token.at === 'home') return homeCenterCoords[color];
            return [0, 0];
        }

        function getCoordCenter(coord) {
            const xVal = (coord[0] % 1 === 0) ? (coord[0] + 0.5) : coord[0];
            const yVal = (coord[1] % 1 === 0) ? (coord[1] + 0.5) : coord[1];
            return [xVal, yVal];
        }

        function coordToPixel(coord) {
            const boardWrapper = document.getElementById('board-wrapper');
            const bw = boardWrapper.offsetWidth;
            const offset = 11; // 5px border + 6px padding
            const inner = bw - offset * 2;
            const center = getCoordCenter(coord);
            const xPx = offset + (center[0] / 15) * inner;
            const yPx = offset + (center[1] / 15) * inner;
            return [xPx, yPx];
        }

        function getPathSteps(color, fromStep, toStep) {
            const steps = [];
            for (let s = fromStep + 1; s <= toStep; s++) {
                let coord;
                if (s === 0) {
                    coord = trackCoords[START_TILES[color]];
                } else if (s <= 50) {
                    coord = trackCoords[(START_TILES[color] + s) % 52];
                } else if (s <= 55) {
                    coord = homePaths[color][s - 51];
                } else if (s === 56) {
                    coord = homeCenterCoords[color];
                }
                if (coord) steps.push(coord);
            }
            return steps;
        }

        // ---- 8. ANIMATION ENGINE ----
        function animateTokenAlongPath(tokenEl, pathCoords, color, stepDelay = 220, prevCoord = null, callback = null) {
            let actualCallback = callback;
            let actualPrevCoord = prevCoord;
            if (typeof prevCoord === 'function') {
                actualCallback = prevCoord;
                actualPrevCoord = null;
            }

            if (!pathCoords.length) {
                if (actualCallback) actualCallback();
                return;
            }

            let stepIndex = 0;
            let prevX, prevY;
            if (actualPrevCoord) {
                const prevCenter = getCoordCenter(actualPrevCoord);
                prevX = prevCenter[0];
                prevY = prevCenter[1];
            } else {
                const firstCoord = pathCoords[0];
                const firstCenter = getCoordCenter(firstCoord);
                prevX = firstCenter[0];
                prevY = firstCenter[1];
            }

            const charWrap = tokenEl.querySelector('.doll-wrapper');
            if (charWrap) {
                charWrap.className = 'doll-wrapper walking';
            }

            const stepDuration = 220; // ms
            const pauseDuration = 80;  // ms

            function animateStep() {
                if (stepIndex >= pathCoords.length) {
                    if (charWrap) {
                        charWrap.className = 'doll-wrapper idle-breathe';
                    }
                    if (actualCallback) actualCallback();
                    return;
                }

                const coord = pathCoords[stepIndex];
                const center = getCoordCenter(coord);
                const targetX = center[0];
                const targetY = center[1];

                const startX = prevX;
                const startY = prevY;

                const startTime = performance.now();

                function easeOutCubic(t) {
                    return 1 - Math.pow(1 - t, 3);
                }

                function tick(now) {
                    const elapsed = now - startTime;
                    const t = Math.min(elapsed / stepDuration, 1);
                    const eased = easeOutCubic(t);

                    const currX = startX + (targetX - startX) * eased;
                    const currY = startY + (targetY - startY) * eased;

                    tokenEl.style.left = `${(currX / 15) * 100}%`;
                    tokenEl.style.top = `${(currY / 15) * 100}%`;

                    if (t < 1) {
                        requestAnimationFrame(tick);
                    } else {
                        AudioManager.playWalk();
                        
                        if (charWrap) {
                            charWrap.classList.remove('walking');
                            charWrap.classList.add('doll-settle');
                        }

                        prevX = targetX;
                        prevY = targetY;
                        stepIndex++;

                        setTimeout(() => {
                            if (charWrap) {
                                charWrap.classList.remove('doll-settle');
                                if (stepIndex < pathCoords.length) {
                                    charWrap.classList.add('walking');
                                }
                            }
                            animateStep();
                        }, pauseDuration);
                    }
                }

                requestAnimationFrame(tick);
            }

            animateStep();
        }

        function animateFlyback(tokenEl, fromCoord, toCoord, callback) {
            const startTime = performance.now();
            const duration = 1000;
            const startCenter = getCoordCenter(fromCoord);
            const endCenter = getCoordCenter(toCoord);
            const startX = startCenter[0];
            const startY = startCenter[1];
            const endX = endCenter[0];
            const endY = endCenter[1];

            // Get board rotation angle
            const rootStyle = getComputedStyle(document.documentElement);
            const rotStr = rootStyle.getPropertyValue('--board-rotation') || '0deg';
            const rotAngle = parseFloat(rotStr) || 0;
            const phi = (-rotAngle * Math.PI) / 180;

            function easeOutQuad(t) {
                return t * (2 - t);
            }

            function tick(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const t = easeOutQuad(progress);

                const baseLinearX = startX + (endX - startX) * t;
                const baseLinearY = startY + (endY - startY) * t;

                const peakVal = 2.25 * Math.sin(Math.PI * progress);
                const arcDx = peakVal * Math.sin(phi);
                const arcDy = -peakVal * Math.cos(phi);

                const x = baseLinearX + arcDx;
                const y = baseLinearY + arcDy;
                const jumpScale = 1 + 0.35 * Math.sin(Math.PI * progress);

                // Fade victim to 60% opacity during flyback
                const opacity = 1 - 0.4 * Math.sin(Math.PI * progress);

                tokenEl.style.left = `${(x / 15) * 100}%`;
                tokenEl.style.top = `${(y / 15) * 100}%`;
                tokenEl.style.transform = `translate(-50%, -50%) scale(${jumpScale})`;
                tokenEl.style.opacity = opacity;

                if (progress < 1) {
                    requestAnimationFrame(tick);
                } else {
                    tokenEl.style.transform = '';
                    tokenEl.style.opacity = '1';
                    callback();
                }
            }
            requestAnimationFrame(tick);
        }

        function detectAndQueueAnimations(currentTokensMap) {
            if (isDiceRolling) return;

            let moverKey = null;
            let victimKey = null;

            for (const key in currentTokensMap) {
                const prev = prevTokenState[key];
                const curr = currentTokensMap[key];

                if (!prev) {
                    prevTokenState[key] = { ...curr };
                    continue;
                }

                if (curr.step !== prev.step || curr.at !== prev.at) {
                    if (curr.step === -1 && prev.step > -1) {
                        victimKey = key;
                    } else if (curr.step > prev.step) {
                        moverKey = key;
                    } else {
                        prevTokenState[key] = { ...curr };
                    }
                }
            }

            if (moverKey) animatingTokens.add(moverKey);
            if (victimKey) animatingTokens.add(victimKey);

            if (moverKey && victimKey) {
                const mPrev = prevTokenState[moverKey];
                const mCurr = currentTokensMap[moverKey];
                const vPrev = prevTokenState[victimKey];
                const vCurr = currentTokensMap[victimKey];
                queueCapture(moverKey, mPrev, mCurr, victimKey, vPrev, vCurr);
            } else if (moverKey) {
                const mPrev = prevTokenState[moverKey];
                const mCurr = currentTokensMap[moverKey];
                queueMove(moverKey, mPrev, mCurr);
            }
        }

        function queueMove(key, prev, curr) {
            prevTokenState[key] = { ...curr };

            animationQueue = animationQueue.then(() => {
                return new Promise(resolve => {
                    const tokenEl = tokenElements[key];
                    if (!tokenEl) {
                        resolve();
                        return;
                    }

                    animatingTokens.add(key);
                    const charWrap = tokenEl.querySelector('.doll-wrapper');
                    if (charWrap) {
                        charWrap.className = 'doll-wrapper walking';
                    }

                    const prevCoord = getTokenCoord(prev, curr.color);
                    const pathCoords = getPathSteps(curr.color, prev.step, curr.step);
                    animateTokenAlongPath(tokenEl, pathCoords, curr.color, 220, prevCoord, () => {
                        if (curr.at === 'home') {
                            // Home Entry Sequence: hop + spin + gold glow + shrink to 0.6
                            const coord = homeCenterCoords[curr.color];
                            const [xPx, yPx] = coordToPixel(coord);
                            
                            const startTime = performance.now();
                            const hopDuration = 600; // ms
                            
                            AudioManager.playWin();
                            HapticsManager.success();
                            spawnParticles(xPx, yPx, COLOR_VALUES[curr.color], 20);

                            if (charWrap) {
                                charWrap.className = 'doll-wrapper';
                            }

                            function animateHomeEntry(now) {
                                const elapsed = now - startTime;
                                const progress = Math.min(elapsed / hopDuration, 1);
                                
                                const hopY = -10 * Math.sin(Math.PI * progress);
                                const spinAngle = 180 * progress;
                                
                                tokenEl.style.transform = `translate(-50%, -50%) translateY(${hopY}px) rotate(${spinAngle}deg)`;
                                
                                if (progress < 1) {
                                    requestAnimationFrame(animateHomeEntry);
                                } else {
                                    const scaleStartTime = performance.now();
                                    const scaleDuration = 500; // ms
                                    
                                    tokenEl.classList.add('token-home');

                                    function animateScaleDown(scaleNow) {
                                        const scaleElapsed = scaleNow - scaleStartTime;
                                        const scaleProgress = Math.min(scaleElapsed / scaleDuration, 1);
                                        const currentScale = 1 - 0.4 * scaleProgress;

                                        tokenEl.style.transform = `translate(-50%, -50%) rotate(180deg) scale(${currentScale})`;

                                        if (scaleProgress < 1) {
                                            requestAnimationFrame(animateScaleDown);
                                        } else {
                                            if (charWrap) charWrap.className = 'doll-wrapper victory-dance';
                                            tokenEl.style.transform = 'translate(-50%, -50%) scale(0.6)';
                                            
                                            // Set resting coordinates for positionToken helper to stay in sync
                                            positionToken(tokenEl, coord[0], coord[1], 0.60);
                                            animatingTokens.delete(key);

                                            updateUI();
                                            resolve();
                                        }
                                    }
                                    requestAnimationFrame(animateScaleDown);
                                }
                            }
                            requestAnimationFrame(animateHomeEntry);

                        } else {
                            const destCoord = getTokenCoord(curr, curr.color);
                            const center = getCoordCenter(destCoord);
                            
                            // Align final size logic
                            positionToken(tokenEl, center[0], center[1], 0.90);
                            animatingTokens.delete(key);

                            if (charWrap) {
                                charWrap.className = 'doll-wrapper';
                                if (curr.at === 'base') charWrap.classList.add('waving');
                                else charWrap.classList.add('idle-breathe');
                            }

                            const isSafe = curr.at === 'track' && safeTiles.includes(curr.pos);
                            if (isSafe) {
                                if (charWrap) {
                                    charWrap.classList.add('celebrate');
                                    setTimeout(() => {
                                        charWrap.classList.remove('celebrate');
                                        charWrap.classList.add('idle-breathe');
                                    }, 550);
                                }
                                AudioManager.playWin();
                            }

                            updateUI();
                            resolve();
                        }
                    });
                });
            });
        }

        function queueCapture(moverKey, mPrev, mCurr, victimKey, vPrev, vCurr) {
            prevTokenState[moverKey] = { ...mCurr };
            prevTokenState[victimKey] = { ...vCurr };

            animationQueue = animationQueue.then(() => {
                return new Promise(resolve => {
                    const attackerEl = tokenElements[moverKey];
                    const victimEl = tokenElements[victimKey];

                    if (!attackerEl) {
                        resolve();
                        return;
                    }

                    animatingTokens.add(moverKey);
                    if (victimEl) animatingTokens.add(victimKey);

                    const prevCoord = getTokenCoord(mPrev, mCurr.color);
                    const pathCoords = getPathSteps(mCurr.color, mPrev.step, mCurr.step);

                    // 1. Attacker walks to the square
                    animateTokenAlongPath(attackerEl, pathCoords, mCurr.color, 220, prevCoord, () => {
                        const destCoord = getTokenCoord(mCurr, mCurr.color);
                        const [xPx, yPx] = coordToPixel(destCoord);

                        const aCharWrap = attackerEl.querySelector('.doll-wrapper');
                        const vCharWrap = victimEl ? victimEl.querySelector('.doll-wrapper') : null;

                        // 2. Attacker aiming state
                        if (aCharWrap) {
                            aCharWrap.className = 'doll-wrapper aiming';
                        }

                        if (victimEl) {
                            const startCoord = getTokenCoord(vPrev, vPrev.color);
                            const endCoord = getTokenCoord(vCurr, vCurr.color);

                            const startCenter = getCoordCenter(startCoord);
                            const endCenter = getCoordCenter(endCoord);

                            const startX = startCenter[0];
                            const startY = startCenter[1];
                            const endX = endCenter[0];
                            const endY = endCenter[1];

                            const dx = endX - startX;
                            const dy = endY - startY;
                            const distPercent = Math.sqrt(dx*dx + dy*dy);
                            const angleRad = Math.atan2(dy, dx);
                            const angleDeg = (angleRad * 180) / Math.PI;

                            // 3. Create aim line in DOM
                            const aimLine = document.createElement('div');
                            aimLine.className = 'aim-line';
                            aimLine.style.left = `${(startX / 15) * 100}%`;
                            aimLine.style.top = `${(startY / 15) * 100}%`;
                            aimLine.style.width = `${(distPercent / 15) * 100}%`;
                            aimLine.style.transform = `rotate(${angleDeg}deg)`;
                            tokensLayer.appendChild(aimLine);

                            // 4. Pause 1.2s
                            setTimeout(() => {
                                // 5. Push lunge
                                if (aCharWrap) {
                                    aCharWrap.className = 'doll-wrapper push';
                                }

                                // Spawn traveling aim orb
                                const orb = document.createElement('div');
                                orb.className = 'aim-orb';
                                orb.style.setProperty('--orb-color', COLOR_VALUES[mCurr.color] || '#ffaa00');
                                orb.style.left = `${(startX / 15) * 100}%`;
                                orb.style.top = `${(startY / 15) * 100}%`;
                                tokensLayer.appendChild(orb);

                                const orbStartTime = performance.now();
                                const orbDuration = 400; // ms

                                function animateOrb(now) {
                                    const elapsed = now - orbStartTime;
                                    const progress = Math.min(elapsed / orbDuration, 1);
                                    
                                    const currX = startX + dx * progress;
                                    const currY = startY + dy * progress;

                                    orb.style.left = `${(currX / 15) * 100}%`;
                                    orb.style.top = `${(currY / 15) * 100}%`;

                                    if (progress < 1) {
                                        requestAnimationFrame(animateOrb);
                                    } else {
                                        orb.remove();
                                        aimLine.remove();

                                        // camera shake
                                        const layout = document.getElementById('game-layout');
                                        layout.classList.remove('camera-shake');
                                        void layout.offsetWidth;
                                        layout.classList.add('camera-shake');
                                        setTimeout(() => layout.classList.remove('camera-shake'), 300);

                                        AudioManager.playCapture();
                                        HapticsManager.heavy();
                                        spawnParticles(xPx, yPx, COLOR_VALUES[mCurr.color], 18);

                                        // 6. Victim reacts (hit)
                                        if (vCharWrap) {
                                            vCharWrap.className = 'doll-wrapper hit';
                                        }

                                        // 7. Victim flies back
                                        setTimeout(() => {
                                            animateFlyback(victimEl, startCoord, endCoord, () => {
                                                const attCenter = getCoordCenter(destCoord);
                                                positionToken(attackerEl, attCenter[0], attCenter[1], 0.90);
                                                positionToken(victimEl, endCenter[0], endCenter[1], 0.90);

                                                animatingTokens.delete(moverKey);
                                                animatingTokens.delete(victimKey);

                                                if (aCharWrap) {
                                                    aCharWrap.className = 'doll-wrapper idle-breathe';
                                                }
                                                if (vCharWrap) {
                                                    vCharWrap.className = 'doll-wrapper waving';
                                                }

                                                const endPx = coordToPixel(endCoord);
                                                spawnParticles(endPx[0], endPx[1], '#ffffff', 8);

                                                updateUI();
                                                resolve();
                                            });
                                        }, 200);
                                    }
                                }
                                requestAnimationFrame(animateOrb);

                            }, 1200);

                        } else {
                            const attCenter = getCoordCenter(destCoord);
                            positionToken(attackerEl, attCenter[0], attCenter[1], 0.90);
                            animatingTokens.delete(moverKey);
                            if (aCharWrap) {
                                aCharWrap.className = 'doll-wrapper idle-breathe';
                            }
                            updateUI();
                            resolve();
                        }
                    });
                });
            });
        }

        // ---- 9. RENDERING ADAPTER ----
        function getSeatLayoutClass(numPlayers) {
            return `layout-${numPlayers}`;
        }

        function renderPlayerCards(pState, player) {
            const activeColors = pState.turnOrder;
            const numPlayers = activeColors.length;
            const activeColor = activeColors[pState.currentTurnIndex];
            const myColor = player ? pState.playerColors[player.id] : null;

            // Rotation offset mapping
            const referenceColor = myColor && activeColors.includes(myColor) ? myColor : activeColors[0];
            const refIdx = activeColors.indexOf(referenceColor);

            const layoutContainer = document.getElementById('game-layout');
            layoutContainer.className = getSeatLayoutClass(numPlayers);

            // Re-apply orientation classes
            const isLandscape = window.innerWidth > window.innerHeight;
            layoutContainer.classList.add(isLandscape ? 'is-landscape' : 'is-portrait');

            // Board rotation for local player perspective
            const boardRotations = { red: -90, green: 180, yellow: 90, blue: 0 };
            const rotAngle = boardRotations[referenceColor] || 0;
            document.documentElement.style.setProperty('--board-rotation', `${rotAngle}deg`);
            document.documentElement.style.setProperty('--counter-rotate', `${-rotAngle}deg`);

            // Rescue the dice element before clearing slots (prevents null ref)
            if (_diceWrapperRef && _diceWrapperRef.parentElement && _diceWrapperRef.parentElement !== _diceTemplateHome) {
                _diceTemplateHome.appendChild(_diceWrapperRef);
            }

            const slots = ['top', 'right', 'bottom', 'left'];
            slots.forEach(slot => {
                const el = document.getElementById(`slot-${slot}`);
                if (el) el.innerHTML = '';
            });

            activeColors.forEach(color => {
                const pid = Object.keys(pState.playerColors).find(id => pState.playerColors[id] === color);
                if (!pid) return;

                const idx = activeColors.indexOf(color);
                const relativeIdx = (idx - refIdx + numPlayers) % numPlayers;

                let slotId = 'bottom';
                if (numPlayers === 2) {
                    slotId = relativeIdx === 0 ? 'bottom' : 'top';
                } else if (numPlayers === 3) {
                    if (relativeIdx === 0) slotId = 'bottom';
                    else if (relativeIdx === 1) slotId = 'top';
                    else slotId = 'left';
                } else if (numPlayers === 4) {
                    if (relativeIdx === 0) slotId = 'bottom';
                    else if (relativeIdx === 1) slotId = 'left';
                    else if (relativeIdx === 2) slotId = 'top';
                    else slotId = 'right';
                }

                const slotEl = document.getElementById(`slot-${slotId}`);
                if (!slotEl) return;

                const isActive = color === activeColor;
                const isMe = pid === (player ? player.id : null);
                const tokens = pState.tokens[pid] || [];
                const piecesLeft = 4 - tokens.filter(t => t.at === 'home').length;

                const room = Arcade.getRoom();
                const pInfo = room ? room.players.find(p => p.id === pid) : null;
                const rawName = pInfo ? pInfo.name : (isMe ? 'YOU' : color.toUpperCase());
                const isConnected = pInfo && pInfo.connected !== false;

                const isSlotHorizontal = (slotId === 'top' || slotId === 'bottom');

                if (isSlotHorizontal) {
                    slotEl.innerHTML = `
                        <div class="player-card horizontal color-${color} ${isActive ? 'active' : ''}">
                            <div class="card-left">
                                <div class="player-avatar">${rawName[0].toUpperCase()}
                                    <div class="player-status-dot ${isConnected ? 'online' : ''}"></div>
                                </div>
                                <div class="player-name">${isMe ? 'YOU' : rawName}</div>
                            </div>
                            <div class="player-dice-container"></div>
                            <div class="card-right">
                                <div class="pieces-remaining">
                                    <span>${piecesLeft}</span>
                                    <span class="pieces-left-label">left</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    slotEl.innerHTML = `
                        <div class="player-card vertical color-${color} ${isActive ? 'active' : ''}">
                            <div class="card-top">
                                <div class="player-avatar">${rawName[0].toUpperCase()}
                                    <div class="player-status-dot ${isConnected ? 'online' : ''}"></div>
                                </div>
                                <div class="player-name">${isMe ? 'YOU' : rawName}</div>
                            </div>
                            <div class="player-dice-container"></div>
                            <div class="card-bottom">
                                <div class="pieces-remaining">
                                    <span>${piecesLeft}</span>
                                    <span class="pieces-left-label">left</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function updateDice(val, isRolled, activePlayerColor, isMyTurn) {
            const diceWrapper = _diceWrapperRef;
            if (!diceWrapper) return;
            const visualDice = diceWrapper.querySelector('.dice');
            if (!visualDice) return;

            if (isDiceRolling) return;

            if (isRolled && val !== null && val !== undefined && activePlayerColor) {
                lastRolledValues[activePlayerColor] = val;
            }

            if (activePlayerColor) {
                const activeSlot = document.querySelector(`.player-card.color-${activePlayerColor}`);
                if (activeSlot) {
                    const diceContainer = activeSlot.querySelector('.player-dice-container');
                    if (diceContainer && diceWrapper.parentElement !== diceContainer) {
                        diceContainer.appendChild(diceWrapper);
                    }
                }
            }

            const allSlots = document.querySelectorAll('.player-card');
            allSlots.forEach(card => {
                const colorClass = Array.from(card.classList).find(c => c.startsWith('color-'));
                if (!colorClass) return;
                const color = colorClass.split('-')[1];

                if (color !== activePlayerColor) {
                    const dc = card.querySelector('.player-dice-container');
                    if (dc) {
                        const lastVal = lastRolledValues[color];
                        dc.innerHTML = lastVal ? `<div class="inactive-dice-val">${lastVal}</div>` : '';
                    }
                }
            });

            // Active State UI updates
            const secondsText = diceWrapper.querySelector('#timer-seconds-text');
            const timerBar = diceWrapper.querySelector('.timer-ring-bar');

            if (isRolled) {
                // If dice settles on a value
                const diceRolledChanged = isRolled && !prevDiceRolled;

                if (val && (diceRolledChanged || val !== lastDiceVal)) {
                    lastDiceVal = val;
                    isDiceRolling = true;
                    if (secondsText) secondsText.style.opacity = '0'; // Hide timer text during rolling

                    diceWrapper.className = 'dice-wrapper dice-thump';
                    visualDice.className = 'dice dice-rolling';

                    AudioManager.playRoll();
                    HapticsManager.medium();

                    setTimeout(() => {
                        visualDice.className = 'dice';
                        visualDice.style.transform = diceRotations[val];
                        diceWrapper.className = 'dice-wrapper';
                        isDiceRolling = false;
                        
                        updateUI();
                    }, 700);
                } else if (val) {
                    visualDice.style.transform = diceRotations[val];
                }
            } else {
                if (secondsText) secondsText.style.opacity = '1';
                if (isMyTurn) {
                    diceWrapper.classList.add('dice-active-glow');
                } else {
                    diceWrapper.classList.remove('dice-active-glow');
                }
            }
        }

        function getStackOffsets(count, index) {
            let scale = 0.90;
            let offsetX = 0;
            let offsetY = 0;

            if (count === 2) {
                scale = 0.75;
                const factor = 0.18;
                if (index === 0) {
                    offsetX = -factor;
                    offsetY = -factor;
                } else {
                    offsetX = factor;
                    offsetY = factor;
                }
            } else if (count === 3) {
                scale = 0.65;
                const factor = 0.18;
                if (index === 0) {
                    offsetX = 0;
                    offsetY = -factor;
                } else if (index === 1) {
                    offsetX = -factor;
                    offsetY = factor;
                } else {
                    offsetX = factor;
                    offsetY = factor;
                }
            } else if (count === 4) {
                scale = 0.58;
                const factor = 0.17;
                if (index === 0) {
                    offsetX = -factor;
                    offsetY = -factor;
                } else if (index === 1) {
                    offsetX = factor;
                    offsetY = -factor;
                } else if (index === 2) {
                    offsetX = -factor;
                    offsetY = factor;
                } else {
                    offsetX = factor;
                    offsetY = factor;
                }
            } else if (count >= 5) {
                scale = 0.50;
                const radius = 0.22;
                const angle = (index * 2 * Math.PI) / count;
                offsetX = radius * Math.cos(angle);
                offsetY = radius * Math.sin(angle);
            }

            return { scale, offsetX, offsetY };
        }

        function renderTokens(pState, player) {
            const myColor = player ? pState.playerColors[player.id] : null;
            const activeColor = pState.turnOrder[pState.currentTurnIndex];
            const isMyTurn = (myColor === activeColor);

            let playableIds = [];
            if (isMyTurn && pState.diceRolled && pState.diceValue && !isDiceRolling) {
                const roll = pState.diceValue;
                const tokens = pState.tokens[player.id] || [];
                tokens.forEach(t => {
                    if (t.step === -1 && roll === 6) playableIds.push(t.id);
                    else if (t.step !== -1 && t.step + roll <= 56) playableIds.push(t.id);
                });
            }

            const currentTokensMap = {};
            const allTokenEntries = [];

            for (const playerId in pState.tokens) {
                const color = pState.playerColors[playerId];
                const tokens = pState.tokens[playerId];
                tokens.forEach(t => {
                    const key = `${playerId}_${t.id}`;
                    currentTokensMap[key] = { ...t, color, playerId };
                });
            }

            if (!prevTokenState) {
                prevTokenState = {};
                for (const key in currentTokensMap) {
                    prevTokenState[key] = { ...currentTokensMap[key] };
                }
            }

            detectAndQueueAnimations(currentTokensMap);

            const groups = {};
            for (const key in currentTokensMap) {
                const entry = currentTokensMap[key];
                const t = entry;
                const color = entry.color;
                const coord = getTokenCoord(t, color);
                const groupKey = `${t.at}_${t.pos}_${color}`;

                if (!groups[groupKey]) groups[groupKey] = [];
                groups[groupKey].push({ token: t, color, playerId: entry.playerId, coord, key });
                allTokenEntries.push({ token: t, color, playerId: entry.playerId, coord, key, groupKey });
            }

            const groupCounts = {};
            const groupIndices = {};
            for (const gk in groups) {
                groupCounts[gk] = groups[gk].length;
                groupIndices[gk] = 0;
            }

            const usedKeys = new Set();

            allTokenEntries.forEach(entry => {
                const { token, color, playerId, coord, key, groupKey } = entry;
                const count = groupCounts[groupKey];
                const index = groupIndices[groupKey]++;
                usedKeys.add(key);

                if (animatingTokens.has(key)) return;

                let tokenEl = tokenElements[key];
                if (!tokenEl) {
                    tokenEl = document.createElement('div');
                    tokenEl.className = `token ${color}`;
                    tokenEl.innerHTML = getCharacterHTML();
                    tokenEl.style.position = 'absolute';
                    tokensLayer.appendChild(tokenEl);
                    tokenElements[key] = tokenEl;
                }

                const center = getCoordCenter(coord);
                const xVal = center[0];
                const yVal = center[1];

                let scale = 0.90;
                let offsetX = 0;
                let offsetY = 0;

                if (token.at !== 'base' && token.at !== 'home') {
                    const offsets = getStackOffsets(count, index);
                    scale = offsets.scale;
                    offsetX = offsets.offsetX;
                    offsetY = offsets.offsetY;
                } else if (token.at === 'home') {
                    scale = 0.60;
                }

                const finalX = xVal + offsetX;
                const finalY = yVal + offsetY;
                positionToken(tokenEl, finalX, finalY, scale);

                const isPlayable = isMyTurn && playerId === player.id && playableIds.includes(token.id);

                tokenEl.className = `token ${color}`;
                if (token.at === 'home') tokenEl.classList.add('token-home');
                if (isPlayable) tokenEl.classList.add('token-playable');

                const charWrap = tokenEl.querySelector('.doll-wrapper');
                const bodyWrap = tokenEl.querySelector('.doll-body');
                if (charWrap) {
                    if (bodyWrap) {
                        bodyWrap.className = 'doll-body';
                        bodyWrap.style.transform = '';
                    }
                    if (token.at === 'home') {
                        charWrap.className = 'doll-wrapper victory-dance';
                    } else {
                        charWrap.className = 'doll-wrapper';
                        if (token.at === 'base') charWrap.classList.add('waving');
                        else charWrap.classList.add('idle-breathe');
                    }
                }

                if (isPlayable) {
                    tokenEl.onclick = () => {
                        AudioManager.playClick();
                        HapticsManager.light();
                        Arcade.sendAction('move_token', { tokenId: token.id });
                    };
                    tokenEl.style.pointerEvents = 'auto';
                } else {
                    tokenEl.onclick = null;
                    tokenEl.style.pointerEvents = 'none';
                }

                const existingBadge = tokenEl.querySelector('.token-stack-count');
                if (count > 1 && index === count - 1 && token.at !== 'base' && token.at !== 'home') {
                    if (!existingBadge) {
                        const badge = document.createElement('div');
                        badge.className = 'token-stack-count';
                        badge.textContent = count;
                        tokenEl.appendChild(badge);
                    } else {
                        existingBadge.textContent = count;
                    }
                } else if (existingBadge) {
                    existingBadge.remove();
                }
            });

            for (const key in tokenElements) {
                if (!usedKeys.has(key)) {
                    const el = tokenElements[key];
                    if (el.parentNode) el.parentNode.removeChild(el);
                    delete tokenElements[key];
                }
            }
        }

        // ---- 10. TIMER RINGS ----
        function updateTimerRings(pState) {
            const diceWrapper = _diceWrapperRef;
            if (!diceWrapper) return;

            // Store server-side timer value and record when we received it
            const maxTime = 30;
            const serverRemaining = pState.timerRemaining !== undefined ? pState.timerRemaining : maxTime;
            timerServerRemaining = serverRemaining;
            timerServerTimestamp = performance.now();

            // Start the local tick loop if not already running
            if (!timerTickRunning) {
                timerTickRunning = true;
                requestAnimationFrame(timerTick);
            }
        }

        function timerTick() {
            const diceWrapper = _diceWrapperRef;
            if (!diceWrapper) {
                timerTickRunning = false;
                return;
            }

            const secondsText = diceWrapper.querySelector('#timer-seconds-text');
            const timerBar = diceWrapper.querySelector('.timer-ring-bar');

            if (isDiceRolling) {
                // Keep ticking but don't update visuals during dice roll
                requestAnimationFrame(timerTick);
                return;
            }

            const maxTime = 30;
            const elapsed = (performance.now() - timerServerTimestamp) / 1000;
            const remaining = Math.max(0, timerServerRemaining - elapsed);

            if (secondsText) {
                secondsText.textContent = Math.ceil(remaining);
                secondsText.style.opacity = '1';
            }

            if (timerBar) {
                const pct = (maxTime - Math.min(remaining, maxTime)) / maxTime;
                const offset = pct * 138.2;
                timerBar.style.strokeDashoffset = offset;

                if (remaining > 15) {
                    timerBar.style.stroke = 'var(--green)';
                } else if (remaining > 8) {
                    timerBar.style.stroke = 'var(--yellow)';
                } else if (remaining > 3) {
                    timerBar.style.stroke = 'var(--yellow-dark)';
                } else {
                    timerBar.style.stroke = 'var(--red)';
                }
            }

            requestAnimationFrame(timerTick);
        }

        // ---- 11. VICTORY SCREEN ----
        function showVictoryScreen(pState) {
            if (shownVictory) return;
            shownVictory = true;

            const overlay = document.getElementById('victory-overlay');
            const title = document.getElementById('victory-title');
            const rankingsList = document.getElementById('victory-rankings');
            const btn = document.getElementById('victory-btn');

            const winnerColor = pState.winner;
            title.textContent = `${winnerColor.toUpperCase()} WINS!`;
            title.style.color = COLOR_VALUES[winnerColor] || '#fff';

            const layout = document.getElementById('game-layout');
            layout.classList.add('victory-zoom');

            const medals = ['🥇', '🥈', '🥉', '4th'];
            rankingsList.innerHTML = '';
            (pState.rankings || []).forEach((color, i) => {
                const li = document.createElement('li');
                li.className = 'rank-item';
                li.innerHTML = `
                    <span class="rank-medal">${medals[i] || ''}</span>
                    <div class="rank-color-dot" style="background:${COLOR_VALUES[color]}"></div>
                    <span>${color.toUpperCase()}</span>
                `;
                rankingsList.appendChild(li);
            });

            overlay.classList.add('visible');

            btn.onclick = () => {
                overlay.classList.remove('visible');
                layout.classList.remove('victory-zoom');
                Arcade.returnToLobby();
            };

            AudioManager.playWin();
            HapticsManager.success();
            startConfetti();
        }

        // Confetti Engine
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const CONFETTI_COUNT = 80;
            const colors = ['#e63946', '#2ec474', '#f5a623', '#3b82f6', '#ffd700', '#ff69b4', '#00d4ff'];

            const pieces = new Array(CONFETTI_COUNT);
            for (let i = 0; i < CONFETTI_COUNT; i++) {
                pieces[i] = {
                    x: Math.random() * canvas.width,
                    y: -10 - Math.random() * canvas.height * 0.5,
                    w: 6 + Math.random() * 5,
                    h: 4 + Math.random() * 4,
                    color: colors[i % colors.length],
                    vx: (Math.random() - 0.5) * 3,
                    vy: 2 + Math.random() * 3,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 8,
                    alpha: 1
                };
            }

            const startTime = performance.now();
            const DURATION = 2200;
            const FADE_START = 1300;

            function animateConfetti(now) {
                const elapsed = now - startTime;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (elapsed > DURATION) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    return;
                }

                const fadeFactor = elapsed > FADE_START
                    ? 1 - (elapsed - FADE_START) / (DURATION - FADE_START)
                    : 1;

                for (let i = 0; i < CONFETTI_COUNT; i++) {
                    const p = pieces[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.035;
                    p.rotation += p.rotSpeed;

                    if (p.y > canvas.height + 20) continue;

                    ctx.save();
                    ctx.globalAlpha = Math.max(0, fadeFactor);
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rotation * Math.PI) / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }

                requestAnimationFrame(animateConfetti);
            }

            requestAnimationFrame(animateConfetti);
        }

        // ---- 12. CONTROLLERS & ACTIONS INPUT ----
        function triggerRoll() {
            const pState = Arcade.getPublicState();
            const player = Arcade.getPlayer();
            if (!pState || !player) return;

            const myColor = pState.playerColors[player.id];
            const activeColor = pState.turnOrder[pState.currentTurnIndex];
            const isMyTurn = (myColor === activeColor);

            if (isMyTurn && !pState.diceRolled && !isDiceLocalAnimation) {
                isDiceLocalAnimation = true;
                AudioManager.playRoll();
                Arcade.sendAction('roll_dice', {});
                setTimeout(() => { isDiceLocalAnimation = false; }, 1000);
            }
        }

        // Bind interactive events
        if (_diceWrapperRef) _diceWrapperRef.addEventListener('click', triggerRoll);

        // Responsive Resizing
        function resizeGame() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const isLandscape = w > h;

            let boardSize;
            if (isLandscape) {
                // Landscape: maximize height, leave room for side cards
                boardSize = Math.min(h * 0.82, w - 200, 700);
            } else {
                // Portrait: ~92% of width, leave room for top/bottom cards
                boardSize = Math.min(w * 0.92, h - 180, 700);
            }

            if (boardSize < 260) boardSize = 260;

            const layoutContainer = document.getElementById('game-layout');
            if (layoutContainer) {
                layoutContainer.classList.remove('is-portrait', 'is-landscape');
                layoutContainer.classList.add(isLandscape ? 'is-landscape' : 'is-portrait');
            }

            document.documentElement.style.setProperty('--board-size', `${boardSize}px`);
            resizeParticlesCanvas();
        }

        window.addEventListener('resize', resizeGame);

        // ---- 13. STATE UDPATE PIPELINE (Arcade main loop) ----
        let currentTurnAlerted = false;

        function updateUI() {
            const pState = Arcade.getPublicState();
            const player = Arcade.getPlayer();
            if (!pState) return;

            const myColor = player ? pState.playerColors[player.id] : null;
            const activeColor = pState.turnOrder[pState.currentTurnIndex];
            const isMyTurn = (myColor === activeColor);

            if (!isMyTurn || !pState.diceRolled) {
                hasAutoMovedThisTurn = false;
            }

            // Cards & Slots
            renderPlayerCards(pState, player);

            // Dice
            updateDice(pState.diceValue, pState.diceRolled, activeColor, isMyTurn);

            // Timer
            updateTimerRings(pState);

            // Tokens
            renderTokens(pState, player);

            // Confetti / Victory
            if (pState.status === 'finished') {
                showVictoryScreen(pState);
            } else {
                if (isMyTurn && !currentTurnAlerted) {
                    HapticsManager.medium();
                    currentTurnAlerted = true;
                } else if (!isMyTurn) {
                    currentTurnAlerted = false;
                }
            }

            // Tracker updates
            prevDiceRolled = pState.diceRolled;

            // Log
            processLogChanges(pState.replayLog);

            // Auto-move trigger
            if (isMyTurn && pState.diceRolled && pState.diceValue && !isDiceRolling && animatingTokens.size === 0 && !hasAutoMovedThisTurn) {
                const roll = pState.diceValue;
                const tokens = pState.tokens[player.id] || [];
                const playableIds = [];
                tokens.forEach(t => {
                    if (t.at === 'home') return;
                    if (t.step === -1 && roll === 6) playableIds.push(t.id);
                    else if (t.step !== -1 && t.step + roll <= 56) playableIds.push(t.id);
                });

                if (playableIds.length === 1) {
                    hasAutoMovedThisTurn = true;
                    const autoTokenId = playableIds[0];
                    setTimeout(() => {
                        const latestState = Arcade.getPublicState();
                        if (latestState && latestState.diceRolled && latestState.diceValue === roll) {
                            HapticsManager.light();
                            Arcade.sendAction('move_token', { tokenId: autoTokenId });
                        }
                    }, 500);
                }
            }
        }

        // ---- INIT ----
        setupBoard();
        resizeGame();
        Arcade.onUpdate(updateUI);
    </script>
